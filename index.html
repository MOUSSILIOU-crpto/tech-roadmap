"CPU, RAM, stockage, OS":{cours:`## 🎯 C'est quoi ?
Un ordinateur est composé de 4 éléments : CPU (cerveau), RAM (mémoire de travail), Stockage (mémoire permanente) et OS (chef d'orchestre).

## 🔍 Comment ça marche ?
▸ **CPU** — Le cerveau. Exécute toutes les instructions. Vitesse en GHz (Intel i7, AMD Ryzen, Snapdragon).
▸ **RAM** — Mémoire temporaire. Comme un bureau de travail. S'efface à l'extinction. 4GB = petit bureau.
▸ **Stockage SSD/HDD** — Mémoire permanente. Tout reste après extinction. SSD = rapide, HDD = lent.
▸ **OS** — Chef d'orchestre. Gère tout le matériel. Ex : Windows, Linux, Android, macOS.

## 💡 Points clés
▸ CPU = cerveau, fait les calculs
▸ RAM = mémoire temporaire (perdue à l'extinction)
▸ Stockage = mémoire permanente
▸ OS = logiciel qui coordonne tout le matériel
▸ Ces 4 travaillent ensemble en permanence

## 🌍 Pourquoi c'est important ?
96% des serveurs web tournent sur Linux. AWS, Docker, tout nécessite ces bases. Savoir pourquoi ton programme rame (RAM saturée ?) = compétence d'ingénieur.`,
exemple:`## 📌 Exemple 1 : Ouvrir Chrome
1. Tu cliques → l'OS reçoit le clic
2. L'OS lit les fichiers Chrome depuis le stockage
3. La RAM charge Chrome pour accès rapide
4. Le CPU exécute le code et affiche l'interface
Tout ça en moins d'une seconde !

## 📌 Exemple 2 : Ton téléphone Android
▸ CPU : Snapdragon ou MediaTek (cerveau)
▸ RAM : 4-8GB (apps ouvertes simultanément)
▸ Stockage : 64-256GB (photos, apps, musique)
▸ OS : Android (gère tout)

## 📌 Exemple 3 : Pourquoi ça rame ?
10 onglets Chrome + Spotify + jeu :
▸ RAM saturée → OS utilise le stockage comme RAM
▸ Le stockage est 10x plus lent que la RAM
▸ Résultat : tout rame !
Solution : fermer des programmes ou ajouter de la RAM.`,

"Binaire & hexadécimal":{cours:`## 🎯 C'est quoi ?
Les ordinateurs ne comprennent que 0 et 1 (binaire). L'hexadécimal est un système à 16 symboles pour représenter les données de façon compacte.

## 🔍 Comment ça marche ?
▸ **Binaire (base 2)** : 0 et 1. Positions : 128,64,32,16,8,4,2,1.
  Exemple : 1010 = 8+0+2+0 = 10 en décimal
▸ **Hexadécimal (base 16)** : 0-9 puis A=10,B=11,C=12,D=13,E=14,F=15.
  FF = 15×16+15 = 255. Utilisé pour les couleurs (#FF6B6B).
▸ **Conversion décimal → binaire** : diviser par 2, noter les restes.

## 💡 Points clés
▸ 1 bit = un 0 ou un 1
▸ 8 bits = 1 octet (byte)
▸ 1 Ko = 1024 octets, 1 Mo = 1024 Ko, 1 Go = 1024 Mo
▸ Hex est utilisé pour les couleurs, adresses mémoire, permissions

## 🌍 Pourquoi c'est important ?
Permissions Linux (chmod 755), couleurs CSS, adresses IP, encodage des données — tout repose sur le binaire et l'hexadécimal.`,
exemple:`## 📌 Exemple 1 : Convertir 13 en binaire
13 ÷ 2 = 6 reste 1
6 ÷ 2 = 3 reste 0
3 ÷ 2 = 1 reste 1
1 ÷ 2 = 0 reste 1
Lire de bas en haut : 1101
Vérif : 8+4+0+1 = 13 ✓

## 📌 Exemple 2 : Couleurs hexadécimales
#FF0000 = rouge pur (FF=255 rouge, 00 vert, 00 bleu)
#00FF00 = vert pur
#0000FF = bleu pur
#FFFFFF = blanc (tout au max)
#000000 = noir (tout à zéro)
#6C63FF = le violet de ton app TechRoadmap !

## 📌 Exemple 3 : Tailles de fichiers
2^10 = 1024 (pourquoi pas 1000 ?)
Car les ordinateurs travaillent en base 2 !
1024 octets = 1 Ko
1024 Ko = 1 Mo
1024 Mo = 1 Go
Un film HD = ~4 Go = 4 × 1024 × 1024 × 1024 octets`,

"Navigation terminal : ls, cd, mkdir, cp, chmod":{cours:`## 🎯 C'est quoi ?
Le terminal est l'outil principal de tout développeur. Tu contrôles l'ordinateur en tapant des commandes texte au lieu de cliquer.

▸ **chmod** — Modifie permissions. chmod +x script.sh. chmod 755 (rwxr-xr-x).
▸ **mv** — Déplace/renomme. rm — Supprime (attention !).

## 💡 Points clés

"IP, DNS, HTTP, client/serveur":{cours:`## 🎯 C'est quoi ?
Internet fonctionne grâce à des protocoles standardisés. IP adresse les machines, DNS traduit les noms en IP, HTTP transfère les pages web.

## 🔍 Comment ça marche ?
▸ **IP** — Adresse unique de chaque appareil sur internet. Ex : 192.168.1.1 (local), 8.8.8.8 (Google).
▸ **DNS** — Annuaire d'internet. Traduit "google.com" → "142.250.74.46". Sans DNS, tu devrais mémoriser des IPs !
▸ **HTTP/HTTPS** — Protocole de transfert web. HTTPS = chiffré avec SSL/TLS. Port 80 (HTTP), 443 (HTTPS).
▸ **Client/Serveur** — Ton navigateur (client) envoie une requête, le serveur répond avec les données.

## 💡 Points clés
▸ DNS = annuaire (nom → IP)
▸ HTTP = langue de communication web
▸ HTTPS = HTTP chiffré (toujours préférer)
▸ Port 80 = HTTP, Port 443 = HTTPS
▸ Code 200 = OK, 404 = Non trouvé, 500 = Erreur serveur

## 🌍 Pourquoi c'est important ?
Tout développeur web travaille avec ces protocoles. La cybersécurité repose sur leur compréhension. Indispensable pour configurer des serveurs, créer des APIs, analyser du trafic réseau.`,
exemple:`## 📌 Exemple 1 : Ouvrir google.com
1. Navigateur demande au DNS : IP de google.com ?

## 📌 Exemple 2 : Requête HTTP

Host: www.example.com
User-Agent: Chrome/100
Le serveur répond :
HTTP/1.1 200 OK
Content-Type: text/html
[contenu HTML]

## 📌 Exemple 3 : Adresses importantes
192.168.1.1 → routeur de ta maison
8.8.8.8 → DNS Google
127.0.0.1 → localhost (toi-même)

"Python : variables, types, conditions":{cours:`## 🎯 C'est quoi ?
Python est le langage le plus populaire au monde. Variables = boîtes qui stockent des données. Types = nature des données. Conditions = prendre des décisions.

"Python : boucles for/while":{cours:`## 🎯 C'est quoi ?
Les boucles répètent des instructions automatiquement. Sans elles, tu devrais écrire 1000 fois la même ligne pour 1000 calculs.

## 🔍 Comment ça marche ?
▸ **for** — Répète pour chaque élément d'une séquence.
  for i in range(5): → 0,1,2,3,4
  for item in liste: → chaque élément
▸ **while** — Répète TANT QUE une condition est vraie.
  while age < 18: → jusqu'à ce que age ≥ 18
▸ **break** — Sortir de la boucle
▸ **continue** — Passer à l'itération suivante
▸ **range(start, stop, step)** — Génère une séquence

## 💡 Points clés
▸ for = quand tu sais combien de fois répéter
▸ while = quand tu ne sais pas à l'avance
▸ Attention aux boucles infinies !
▸ range(10) = 0 à 9 (pas 10 !)
▸ enumerate() donne index + valeur

## 🌍 Pourquoi c'est important ?
Les boucles = l'automatisation. Analyser des millions de données, scanner des réseaux, entraîner des modèles ML — tout utilise des boucles.`,
exemple:`## 📌 Exemple 1 : Boucle for
for i in range(5):
    print(i)  # 0,1,2,3,4

fruits = ["banane","mango","orange"]
for fruit in fruits:
    print("J'aime le", fruit)

## 📌 Exemple 2 : Boucle while

while compteur < 5:
    print(compteur)
    compteur += 1

## 📌 Exemple 3 : Break et continue
for i in range(10):
    if i == 5:
        break      # Arrête à 5
    print(i)       # 0,1,2,3,4

for i in range(10):
    if i % 2 == 0:
        continue   # Saute les pairs
    print(i)       # 1,3,5,7,9`,

"Fonctions et portée":{cours:`## 🎯 C'est quoi ?
Une fonction est un bloc de code réutilisable qui effectue une tâche précise. La portée définit où une variable est accessible.

## 🔍 Comment ça marche ?
▸ **def nom(params):* — Définir une fonction
▸ **return** — Retourner une valeur
▸ **Paramètres** — Variables d'entrée
▸ **Arguments** — Valeurs passées à l'appel
▸ **Portée locale** — Variable dans une fonction, accessible seulement dedans
▸ **Portée globale** — Variable hors fonction, accessible partout

## 💡 Points clés
▸ DRY = Don't Repeat Yourself
▸ Une fonction = une tâche précise
▸ Noms : verbes, snake_case (calculer_bmi)
▸ Variables locales disparaissent après l'appel
▸ Paramètres par défaut : def f(x, y=10)

## 🌍 Pourquoi c'est important ?
Les fonctions sont la base de tout programme. En ML, chaque étape est une fonction. En cybersécurité, chaque vérification est une fonction. Concept le plus fondamental après les variables.`,
exemple:`## 📌 Exemple 1 : Fonction simple
def saluer(nom):
    return "Bonjour " + nom + " !"

print(saluer("ICHOLA"))  # Bonjour ICHOLA !

def saluer(nom, langue="fr"):
    if langue == "fr":
        return "Bonjour " + nom
    return "Hello " + nom

## 📌 Exemple 2 : Portée (scope)
x = 10  # Global

def ma_fonction():
    y = 20  # Local
    print(x)  # OK : x est global
    print(y)  # OK : y est local

ma_fonction()
# print(y)  # ERREUR : y n'existe pas ici !

## 📌 Exemple 3 : Fonctions multiples
def surface(l, L):
    return l * L

def perimetre(l, L):
    return 2 * (l + L)

def analyser(l, L):
    s = surface(l, L)
    p = perimetre(l, L)
    return f"Surface: {s}, Périmètre: {p}"

print(analyser(5, 3))`,

"Lire/écrire fichiers":{cours:`## 🎯 C'est quoi ?
Lire et écrire des fichiers permet à Python de persister des données : sauvegarder des résultats, lire des configurations, traiter des CSV, JSON.

"Modules os, sys, json":{cours:`## 🎯 C'est quoi ?
Python a une bibliothèque standard immense. os, sys et json sont parmi les modules les plus utilisés en développement professionnel.

## 🔍 Module os
▸ os.getcwd() → dossier actuel
▸ os.listdir() → liste les fichiers
▸ os.mkdir() / os.makedirs() → crée des dossiers
▸ os.path.exists() → vérifie l'existence
▸ os.path.join() → construit des chemins (portable)
▸ os.remove() / os.rmdir() → supprimer

## 🔍 Module sys
▸ sys.argv → arguments de la ligne de commande
▸ sys.exit(code) → quitter le programme
▸ sys.path → chemins de recherche des modules
▸ sys.version → version de Python

## 🔍 Module json
▸ json.loads(str) → string JSON → Python
▸ json.dumps(obj) → Python → string JSON
▸ json.load(file) → fichier → Python
▸ json.dump(obj, file) → Python → fichier

## 💡 Points clés

▸ os.path.join() préférable aux "/" manuels (Windows compatible)
▸ JSON = format universel d'échange de données
▸ sys.argv[0] = nom du script, [1] = premier argument

## 🌍 Pourquoi c'est important ?
Ces modules sont dans 90% des scripts Python professionnels : automatisation, configuration, échange de données avec des APIs.`,

import os

"Gestion d'erreurs (try/except)":{cours:`## 🎯 C'est quoi ?
La gestion d'erreurs permet à ton programme de réagir intelligemment aux problèmes au lieu de planter. try/except = le filet de sécurité du code professionnel.

## 🔍 Comment ça marche ?
▸ **try** — Le code qui pourrait générer une erreur
▸ **except TypeErreur** — Ce qui se passe si cette erreur survient
▸ **else** — Exécuté seulement si pas d'erreur
▸ **finally** — Toujours exécuté (avec ou sans erreur)
▸ **raise** — Lever une exception manuellement

Erreurs courantes :
▸ ValueError : mauvaise valeur (int("abc"))
▸ ZeroDivisionError : division par zéro
▸ FileNotFoundError : fichier introuvable
▸ KeyError : clé inexistante dans un dict
▸ IndexError : index hors limites

## 💡 Points clés
▸ Ne jamais utiliser except: seul (trop large !)
▸ Capturer les exceptions spécifiques
▸ finally pour nettoyer (fermer fichiers, connexions)
▸ Exception personnalisée : class MonErreur(Exception)

## 🌍 Pourquoi c'est important ?
Un programme professionnel ne plante jamais. Les erreurs non gérées font planter les serveurs en production. C'est une compétence de développeur senior.`,
exemple:`## 📌 Exemple 1 : try/except basique
try:
    nombre = int(input("Entrez un nombre: "))
    resultat = 100 / nombre
    print("Résultat:", resultat)
except ValueError:
    print("Ce n'est pas un nombre !")
except ZeroDivisionError:
    print("Division par zéro !")

## 📌 Exemple 2 : else et finally
try:
    fichier = open("data.txt","r")
    contenu = fichier.read()
except FileNotFoundError:
    print("Fichier introuvable !")
else:
    print("Lu avec succès !")

"Complexité O(n)":{cours:`## 🎯 C'est quoi ?
La notation Big O décrit comment le temps d'exécution d'un algorithme évolue en fonction de la taille des données. Indispensable pour écrire du code efficace.

## 🔍 Les complexités principales
▸ **O(1)** — Constant. Accès à un tableau par index. Toujours le même temps.
▸ **O(log n)** — Logarithmique. Recherche binaire. Très efficace.
▸ **O(n)** — Linéaire. Parcours d'une liste. Proportionnel à n.
▸ **O(n log n)** — Tri efficace (merge sort, quicksort).
▸ **O(n²)** — Deux boucles imbriquées. Tri bulles. Lent !
▸ **O(2ⁿ)** — Exponentiel. Fibonacci naïf. Très lent !

## 💡 Points clés
▸ On analyse le pire cas (worst case)
▸ Les constantes sont ignorées : O(2n) = O(n)
▸ On garde le terme dominant : O(n²+n) = O(n²)
▸ Pour n=1000 : O(n)=1000 ops, O(n²)=1,000,000 ops !
▸ dict["clé"] = O(1) (table de hachage)

## 🌍 Pourquoi c'est important ?
Un algorithme O(n²) sur 1 million d'éléments = des heures. O(n log n) = quelques secondes. Les entretiens Google/Amazon testent systématiquement la complexité.`,
exemple:`## 📌 Exemple 1 : O(1) vs O(n)
def premier_element(liste):
    return liste[0]  # O(1) - toujours 1 opération

def trouver_max(liste):
    m = liste[0]
    for e in liste:  # O(n) - n opérations
        if e > m:
            m = e
    return m

## 📌 Exemple 2 : O(n²) amélioré en O(n)
# O(n²) - double boucle
def doublons_lent(liste):
    for i in range(len(liste)):
        for j in range(i+1,len(liste)):
            if liste[i]==liste[j]:
                return True
    return False

# O(n) - avec un set
def doublons_rapide(liste):
    vus = set()
    for e in liste:
        if e in vus:
            return True
        vus.add(e)
    return False

## 📌 Exemple 3 : Mesurer le temps
import time

liste = list(range(10000))
for fn in [doublons_lent, doublons_rapide]:
    debut = time.time()
    fn(liste)
    print(f"{fn.__name__}: {time.time()-debut:.4f}s")`,

"Récursion":{cours:`## 🎯 C'est quoi ?
La récursion = une fonction qui s'appelle elle-même. Technique puissante pour des problèmes décomposables en sous-problèmes identiques.

## 🔍 Comment ça marche ?
▸ **Cas de base** — La condition d'arrêt (OBLIGATOIRE sinon boucle infinie !)
▸ **Cas récursif** — La fonction s'appelle avec un problème plus petit
▸ **Pile d'appels** — Chaque appel crée un nouveau cadre en mémoire

Structure :
def fonction(n):
    if n == 0:          # Cas de base
        return 1
    return n * fonction(n-1)  # Récursif

## 💡 Points clés
▸ Toujours définir le cas de base EN PREMIER
▸ Chaque appel doit se rapprocher du cas de base
▸ Python limite la récursion à ~1000 appels
▸ @lru_cache pour mémoriser les résultats (mémoïsation)
▸ La récursion est plus élégante mais consomme plus de mémoire

## 🌍 Pourquoi c'est important ?
Arbres, graphes, algorithmes de tri (merge sort), fractales, parseurs — tout utilise la récursion. Questions classiques en entretiens techniques.`,
exemple:`## 📌 Exemple 1 : Factorielle
def factorielle(n):
    if n <= 1:           # Cas de base
        return 1
    return n * factorielle(n-1)  # Récursif

# 5! = 5×4×3×2×1 = 120
print(factorielle(5))  # 120

## 📌 Exemple 2 : Fibonacci
def fib(n):
    if n <= 1:
        return n
    return fib(n-1) + fib(n-2)

# Optimisé avec mémoïsation
from functools import lru_cache
@lru_cache(maxsize=None)
def fib_rapide(n):
    if n <= 1:
        return n
    return fib_rapide(n-1) + fib_rapide(n-2)

## 📌 Exemple 3 : Somme récursive
def somme(liste):
    if len(liste) == 0:
        return 0
    return liste[0] + somme(liste[1:])

print(somme([1,2,3,4]))  # 10`,

"Tri par insertion, tri bulles":{cours:`## 🎯 C'est quoi ?
Le tri bulles compare deux éléments adjacents et les échange si nécessaire (O(n²)). Le tri par insertion insère chaque élément à sa bonne position, comme trier des cartes.

## 🔍 Tri bulles
▸ Compare éléments adjacents, échange si nécessaire
▸ Les grands éléments remontent comme des bulles
▸ Complexité : O(n²)

## 🔍 Tri par insertion
▸ Construit le tableau trié un élément à la fois
▸ O(n²) en général, O(n) si déjà trié
▸ Efficace pour les petites listes (<50 éléments)

## 💡 Points clés
▸ Les deux sont O(n²) = lents pour les grandes listes
▸ Python utilise Timsort O(n log n) pour list.sort()
▸ Comprendre ces tris = comprendre les algorithmes
▸ Base pour comprendre merge sort et quicksort

## 🌍 Pourquoi c'est important ?
Incontournables en entretiens techniques. Google, Amazon, Meta testent les algorithmes de tri.`,exemple:`## 📌 Exemple 1 : Tri bulles
def tri_bulles(l):
    n = len(l)
    for i in range(n):
        for j in range(0, n-i-1):
            if l[j] > l[j+1]:
                l[j], l[j+1] = l[j+1], l[j]
    return l

print(tri_bulles([64,34,25,12,22]))
# [12,22,25,34,64]

## 📌 Exemple 2 : Tri par insertion
def tri_insertion(l):
    for i in range(1, len(l)):
        cle = l[i]
        j = i - 1
        while j >= 0 and l[j] > cle:
            l[j+1] = l[j]
            j -= 1
        l[j+1] = cle
    return l

## 📌 Exemple 3 : Comparaison
import time, random
liste = random.sample(range(10000), 1000)
for fn in [tri_bulles, tri_insertion, sorted]:
    debut = time.time()
    fn(liste.copy())
    print(f"{fn.__name__}: {time.time()-debut:.4f}s")`,exercice:`## ✏️ Exercice 1 (Facile)

"Recherche binaire":{cours:`## 🎯 C'est quoi ?
La recherche binaire trouve un élément dans une liste TRIÉE en divisant l'espace par 2 à chaque étape. Complexité O(log n) — incroyablement rapide !

## 🔍 Comment ça marche ?
1. Prends l'élément du milieu
2. Si c'est l'élément → trouvé !
3. Si cherché < milieu → cherche à gauche
4. Si cherché > milieu → cherche à droite
5. Répète jusqu'à trouver ou zone vide

## 💡 Points clés
▸ 1000 éléments → max 10 comparaisons
▸ 1 million → max 20 comparaisons
▸ 1 milliard → max 30 comparaisons !
▸ La liste DOIT être triée
▸ Retourne l'index ou -1 si non trouvé

## 🌍 Pourquoi c'est important ?
Utilisée dans les bases de données, systèmes de fichiers, jeux vidéo. Classique des entretiens techniques.`,exemple:`## 📌 Exemple 1 : Version itérative
def recherche_binaire(liste, cible):
    g, d = 0, len(liste)-1
    while g <= d:
        m = (g+d)//2
        if liste[m] == cible:
            return m
        elif liste[m] < cible:
            g = m+1
        else:
            d = m-1
    return -1

l = [2,5,8,12,16,23,38,56,72,91]
print(recherche_binaire(l, 23))  # 5
print(recherche_binaire(l, 10))  # -1

## 📌 Exemple 2 : Version récursive
def binaire_rec(l, cible, g, d):
    if g > d:
        return -1
    m = (g+d)//2
    if l[m] == cible:
        return m
    elif l[m] < cible:
        return binaire_rec(l, cible, m+1, d)
    return binaire_rec(l, cible, g, m-1)

## 📌 Exemple 3 : Jeu de devinette automatique
import random
nombre = random.randint(1, 100)
g, d, essais = 1, 100, 0
while g <= d:
    m = (g+d)//2
    essais += 1
    if m == nombre:
        print(f"Trouvé {nombre} en {essais} essais !")
        break
    elif m < nombre:
        g = m+1
    else:
        d = m-1`,exercice:`## ✏️ Exercice 1 (Facile)

"Graphes (BFS, DFS)":{cours:`## 🎯 C'est quoi ?
Un graphe est un ensemble de nœuds reliés par des arêtes. BFS et DFS sont les deux algorithmes fondamentaux pour le parcourir.

## 🔍 BFS — En largeur
▸ Explore tous les voisins avant d'aller plus loin
▸ Utilise une FILE (queue)
▸ Trouve le PLUS COURT CHEMIN (graphe non pondéré)
▸ Applications : réseaux sociaux, GPS

## 🔍 DFS — En profondeur
▸ Explore le plus loin possible avant de revenir
▸ Utilise une PILE ou la récursion
▸ Applications : labyrinthe, détection de cycles

## 💡 Points clés
▸ Graphe = dict Python {noeud: [voisins]}
▸ BFS = niveau par niveau
▸ DFS = branche par branche
▸ Marquer les nœuds visités pour éviter les cycles

## 🌍 Pourquoi c'est important ?
Réseaux sociaux, GPS, moteurs de recherche, compilateurs — les graphes sont partout.`,exemple:`## 📌 Exemple 1 : Représentation
graphe = {
    "A": ["B","C"],
    "B": ["A","D","E"],
    "C": ["A","F"],
    "D": ["B"],
    "E": ["B","F"],
    "F": ["C","E"]
}

## 📌 Exemple 2 : BFS
from collections import deque

def bfs(graphe, depart):
    visites = []
    file = deque([depart])
    vus = {depart}
    while file:
        n = file.popleft()
        visites.append(n)
        for v in graphe[n]:
            if v not in vus:
                vus.add(v)
                file.append(v)
    return visites

## 📌 Exemple 3 : DFS
def dfs(graphe, noeud, vus=None):
    if vus is None:
        vus = set()
    vus.add(noeud)
    print(noeud, end=" ")
    for v in graphe[noeud]:
        if v not in vus:
            dfs(graphe, v, vus)`,exercice:`## ✏️ Exercice 1 (Facile)

"Tables de hachage":{cours:`## 🎯 C'est quoi ?
Une table de hachage associe des clés à des valeurs avec une recherche en O(1) en moyenne. Le dictionnaire Python EST une table de hachage.

## 🔍 Comment ça marche ?
1. Une fonction de hachage convertit la clé en un index
2. L'index pointe vers l'emplacement de la valeur
3. En cas de collision → chaînage ou sondage linéaire

▸ hash("nom") → un entier
▸ index = hash(clé) % taille_table
▸ Facteur de charge → déclenchement du redimensionnement

## 💡 Points clés
▸ dict Python = table de hachage optimisée
▸ Clés doivent être hashables (str, int, tuple) — pas list !
▸ Recherche O(1) en moyenne
▸ hash(x) pour voir le hash d'un objet

## 🌍 Pourquoi c'est important ?
Bases de données, caches, compilateurs — les tables de hachage sont partout. Comprendre leur fonctionnement = comprendre pourquoi Python dict est si rapide.`,exemple:`## 📌 Exemple 1 : Dict Python = Hash Table
annuaire = {"Alice": "0712345678", "Bob": "0698765432"}
print(annuaire["Alice"])    # O(1) !
print("Bob" in annuaire)    # O(1) !
print(hash("Alice"))        # Un grand entier

## 📌 Exemple 2 : Hash table simple
class HashTable:
    def __init__(self, taille=10):
        self.taille = taille
        self.table = [[] for _ in range(taille)]

    def _index(self, cle):
        return hash(cle) % self.taille

    def set(self, cle, valeur):
        idx = self._index(cle)
        for pair in self.table[idx]:
            if pair[0] == cle:
                pair[1] = valeur
                return
        self.table[idx].append([cle, valeur])

    def get(self, cle):
        for pair in self.table[self._index(cle)]:
            if pair[0] == cle:
                return pair[1]

## 📌 Exemple 3 : Compter les mots
def compter_mots(texte):
    compteur = {}
    for mot in texte.lower().split():
        compteur[mot] = compteur.get(mot, 0) + 1
    return sorted(compteur.items(), key=lambda x: -x[1])`,exercice:`## ✏️ Exercice 1 (Facile)

"Classes et objets":{cours:`## 🎯 C'est quoi ?
La POO (Programmation Orientée Objet) organise le code autour d'objets qui combinent données (attributs) et comportements (méthodes).

## 🔍 Concepts fondamentaux
▸ **Classe** — Le moule/plan. class NomClasse:
▸ **Objet/Instance** — Un exemplaire créé depuis la classe
▸ **__init__** — Constructeur, appelé à la création
▸ **self** — Référence à l'instance actuelle
▸ **Attribut** — Variable de l'objet (self.nom)

▸ **__str__** — Représentation en string (print)

## 💡 Points clés
▸ PascalCase pour les noms de classes

▸ Attributs de classe (partagés) vs d'instance (propres)
▸ @classmethod et @staticmethod pour les méthodes spéciales

## 🌍 Pourquoi c'est important ?
Django, Flask, PyTorch, scikit-learn — tout est orienté objet. Créer un modèle Django = hériter de Model.`,exemple:`## 📌 Exemple 1 : Classe simple
class Etudiant:
    def __init__(self, nom, age):
        self.nom = nom
        self.age = age
        self.notes = []

    def ajouter_note(self, note):
        self.notes.append(note)

"SELECT, WHERE, ORDER BY":{cours:`## 🎯 C'est quoi ?
SQL est le langage universel pour interroger les bases de données. SELECT, WHERE, ORDER BY sont les bases de toute requête SQL.

## 🔍 Les commandes
▸ **SELECT** — Choisir les colonnes

  SELECT * FROM etudiants (toutes colonnes)

## 🌍 Pourquoi c'est important ?

"JOINs (INNER, LEFT, RIGHT)":{cours:`## 🎯 C'est quoi ?
Les JOINs combinent des données de plusieurs tables en utilisant une relation commune. Fondamental pour les bases de données relationnelles.

## 🔍 Types de JOINs
▸ **INNER JOIN** — Seulement les lignes correspondantes dans les DEUX tables.
▸ **LEFT JOIN** — TOUTES les lignes de gauche + correspondances droite (NULL si absent).
▸ **RIGHT JOIN** — Toutes les lignes de droite + correspondances gauche.

Syntaxe :
SELECT col1, col2
FROM table1
INNER JOIN table2 ON table1.id = table2.fk_id

## 💡 Points clés
▸ ON définit la condition de jointure
▸ Toujours préciser la table : table.colonne
▸ Les alias rendent le code plus lisible
▸ LEFT JOIN pour les rapports (garder toutes les données)
▸ Les JOINs peuvent être chaînés

## 🌍 Pourquoi c'est important ?
Dans toute base de données réelle, les données sont dans plusieurs tables. Les JOINs permettent de les combiner efficacement.`,exemple:`## 📌 Exemple 1 : INNER JOIN
Table etudiants : id, nom, cours_id
Table cours : id, titre, professeur

SELECT e.nom, c.titre, c.professeur
FROM etudiants e
INNER JOIN cours c ON e.cours_id = c.id;

## 📌 Exemple 2 : LEFT JOIN
SELECT e.nom, c.titre
FROM etudiants e
LEFT JOIN cours c ON e.cours_id = c.id;
-- Si pas de cours → titre = NULL

## 📌 Exemple 3 : JOINs multiples
SELECT cl.nom, p.nom, co.quantite, p.prix*co.quantite AS total
FROM commandes co
INNER JOIN clients cl ON co.client_id = cl.id
INNER JOIN produits p ON co.produit_id = p.id
WHERE cl.ville = 'Cotonou'
ORDER BY total DESC;`,exercice:`## ✏️ Exercice 1 (Facile)

"SQLite avec Python":{cours:`## 🎯 C'est quoi ?
SQLite est une base de données légère intégrée dans Python. Pas de serveur à installer — le module sqlite3 est inclus nativement.

## 🔍 Comment ça marche ?
▸ sqlite3.connect('db.sqlite3') — Crée/ouvre la base

"Architecture REST":{cours:`## 🎯 C'est quoi ?
REST (Representational State Transfer) est l'architecture standard pour les APIs web. Une API REST permet à différentes applications de communiquer via HTTP.

## 🔍 Principes REST
▸ **Ressources** — Tout est une ressource
  /api/users → liste des utilisateurs
  /api/users/123 → utilisateur id=123
▸ **Méthodes HTTP** :
  - GET → Lire
  - POST → Créer
  - PUT/PATCH → Modifier
  - DELETE → Supprimer
▸ **Stateless** — Chaque requête est indépendante
▸ **JSON** — Format de données universel

Codes de statut :
▸ 200 OK, 201 Created, 204 No Content
▸ 400 Bad Request, 401 Unauthorized, 404 Not Found
▸ 500 Internal Server Error

## 💡 Points clés
▸ URLs en minuscules : /api/user-profiles
▸ Noms au pluriel : /api/users
▸ Versionnage : /api/v1/users
▸ Toujours retourner le bon code de statut

## 🌍 Pourquoi c'est important ?
Toutes les apps modernes utilisent des APIs REST. Créer une API REST = créer le backend de toute application web ou mobile.`,exemple:`## 📌 Exemple 1 : Structure d'une API REST
GET    /api/v1/etudiants      → liste tous
GET    /api/v1/etudiants/1    → un étudiant
POST   /api/v1/etudiants      → créer
PUT    /api/v1/etudiants/1    → modifier
DELETE /api/v1/etudiants/1    → supprimer

## 📌 Exemple 2 : API Flask basique
from flask import Flask, jsonify, request

app = Flask(__name__)
etudiants = [{"id":1,"nom":"Alice","note":18}]

@app.route('/api/v1/etudiants', methods=['GET'])
def get_etudiants():
    return jsonify(etudiants), 200

@app.route('/api/v1/etudiants/<int:id>', methods=['GET'])
def get_etudiant(id):
    e = next((x for x in etudiants if x['id']==id), None)
    if not e:
        return jsonify({"error":"Non trouvé"}), 404
    return jsonify(e), 200

## 📌 Exemple 3 : POST et DELETE
@app.route('/api/v1/etudiants', methods=['POST'])
def creer():
    data = request.json
    nouvel = {"id":len(etudiants)+1, **data}
    etudiants.append(nouvel)
    return jsonify(nouvel), 201`,exercice:`## ✏️ Exercice 1 (Facile)

function CourseModal({topic, phaseColor, onClose}) {
  const [tab, setTab] = useState("cours");

  const courseData = COURSES[topic] || getDefaultCourse(topic);
  const content = courseData[tab];

  function renderMd(text) {
    const lines = text.split("\n");
    return lines.map((line, i) => {
      if(line.startsWith("## ")) return <div key={i} style={{fontWeight:800,fontSize:15,color:phaseColor,margin:"16px 0 8px",borderBottom:`1px solid ${phaseColor}33`,paddingBottom:6}}>{line.replace("## ","")}</div>;
      if(line.startsWith("▸ **") || line.startsWith("**")) {
        const parts = line.split("**");
        return <div key={i} style={{display:"flex",gap:8,padding:"5px 0",alignItems:"flex-start"}}>
          {line.startsWith("▸") && <span style={{color:phaseColor,flexShrink:0,marginTop:1}}>▸</span>}
          <span style={{fontSize:13,color:"#CCC",lineHeight:1.6}}>
            {parts.map((p,j)=>j%2===1?<strong key={j} style={{color:"#E2E4F0"}}>{p}</strong>:<span key={j}>{p.replace("▸ ","")}</span>)}
          </span>
        </div>;
      }
      if(line.startsWith("▸ ")) return <div key={i} style={{display:"flex",gap:8,padding:"4px 0",alignItems:"flex-start"}}><span style={{color:phaseColor,flexShrink:0,marginTop:1}}>▸</span><span style={{fontSize:13,color:"#CCC",lineHeight:1.6}}>{line.replace("▸ ","")}</span></div>;
      if(line.startsWith("# ")) return <div key={i} style={{fontFamily:"monospace",fontSize:12,color:"#00C9A7",background:"#0A1A10",padding:"3px 8px",borderRadius:4,margin:"2px 0"}}>{line}</div>;

      return <div key={i} style={{color:"#CCC",fontSize:13,lineHeight:1.7,padding:"2px 0"}}>{line}</div>;

  return (
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}

const SK = "trp_v4";

function getLevel(xp) {
  for(let i=LEVELS.length-1;i>=0;i--) if(xp>=LEVELS[i].min) return {level:i+1,...LEVELS[i]};
  return {level:1,...LEVELS[0]};
}
function getLevelPct(xp) {
  const l=getLevel(xp);
  return Math.round(((xp-l.min)/(l.max-l.min))*100);
}

function App() {
  const [tab,setTab] = useState("dashboard");
  const [progress,setProgress] = useState({});
  // xp, streak, badges, journal, pomodoros
  const [meta,setMeta] = useState({xp:0,streak:0,lastActive:"",totalPomodoros:0,badges:[],journalCount:0});
  const [activePhase,setActivePhase] = useState("p0");
  const [activeWeek,setActiveWeek] = useState("p0w1");
  const [quizState,setQuizState] = useState(null); // {phaseId,weekId,answers:[],done}
  const [journalOpen,setJournalOpen] = useState(false);
  const [journalEntry,setJournalEntry] = useState("");
  const [journalHistory,setJournalHistory] = useState([]);
  const [pomodoroActive,setPomodoroActive] = useState(false);
  const [pomodoroSeconds,setPomodoroSeconds] = useState(25*60);
  const [pomodoroPhase,setPomodoroPhase] = useState("work"); // work | break
  const [toast,setToast] = useState(null);
  const [planOpen,setPlanOpen] = useState(false);
  const [loaded,setLoaded] = useState(false);
  const [activeCourse,setActiveCourse] = useState(null);
  const timerRef = useRef(null);

  // ── LOAD ──
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(SK);
      if(raw){
        const d = JSON.parse(raw);
        if(d.progress){
          const p={};
          for(const[k,v] of Object.entries(d.progress)) p[k]={...v,topics:new Set(v.topics||[])};
          setProgress(p);
        }
        if(d.meta) setMeta(d.meta);
        if(d.journal) setJournalHistory(d.journal);
      }
    } catch(e){}
    setLoaded(true);
  },[]);

  // ── SAVE ──
  useEffect(()=>{
    if(!loaded) return;
    try {
      const sp={};
      for(const[k,v] of Object.entries(progress)) sp[k]={...v,topics:Array.from(v.topics||[])};
      localStorage.setItem(SK, JSON.stringify({progress:sp,meta,journal:journalHistory}));
    } catch(e){}
  },[progress,meta,journalHistory,loaded]);

  // ── POMODORO TIMER ──
  useEffect(()=>{
    if(pomodoroActive){
      timerRef.current = setInterval(()=>{
        setPomodoroSeconds(s=>{
          if(s<=1){
            clearInterval(timerRef.current);
            setPomodoroActive(false);
            if(pomodoroPhase==="work"){
              addXp(XP_POMODORO,"🍅 Pomodoro terminé !");
              setMeta(m=>{
                const newTotal=m.totalPomodoros+1;
                const nb=[...m.badges];
                if(newTotal>=10 && !nb.includes("pomodoro_10")){nb.push("pomodoro_10");showToast("Badge débloqué : Focus Master 🍅");}
                return {...m,totalPomodoros:newTotal,badges:nb};
              });
              setPomodoroPhase("break");
              return 5*60;
            } else {
              setPomodoroPhase("work");
              return 25*60;
            }
          }
          return s-1;
        });
      },1000);
    } else {
      clearInterval(timerRef.current);
    }
    return ()=>clearInterval(timerRef.current);
  },[pomodoroActive,pomodoroPhase]);

  function showToast(msg,type="success"){
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  }

  function addXp(amount,msg){
    setMeta(m=>{
      const newXp=m.xp+amount;
      const oldLevel=getLevel(m.xp).level;
      const newLevel=getLevel(newXp).level;
      if(newLevel>oldLevel) showToast(`⬆️ Niveau ${newLevel} : ${getLevel(newXp).name} ${getLevel(newXp).icon}`,"level");
      return {...m,xp:newXp};
    });
    showToast(msg);
  }

  function checkAndUpdateStreak(){
    const today=new Date().toISOString().slice(0,10);
    setMeta(m=>{
      if(m.lastActive===today) return m;
      const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
      const newStreak = m.lastActive===yesterday ? m.streak+1 : 1;
      const nb=[...m.badges];
      if(newStreak>=3 && !nb.includes("streak_3")){nb.push("streak_3");showToast("Badge : 3 jours de feu 🔥");}
      if(newStreak>=7 && !nb.includes("streak_7")){nb.push("streak_7");showToast("Badge : Semaine de fer ⚡");}
      if(newStreak>=30 && !nb.includes("streak_30")){nb.push("streak_30");showToast("Badge : Mois invaincu 🏆");}
      return {...m,streak:newStreak,lastActive:today,badges:nb};
    });
  }

  function toggleTopic(phaseId,weekId,topicIndex){
    checkAndUpdateStreak();
    const key=`${phaseId}__${weekId}`;
    setProgress(prev=>{
      const cur=prev[key]||{topics:new Set(),completed:false,quizPassed:false};
      const topics=new Set(cur.topics);
      const phase=PROGRAM.find(p=>p.id===phaseId);
      const week=phase.weeks.find(w=>w.id===weekId);
      if(topics.has(topicIndex)){
        topics.delete(topicIndex);
      } else {
        topics.add(topicIndex);
        if(!cur.topics.has(topicIndex)){
          addXp(XP_TOPIC,`+${XP_TOPIC} XP — sujet complété !`);
          setMeta(m=>{
            const nb=[...m.badges];
            const allTopics=Object.values({...prev,[key]:{topics,completed:false,quizPassed:false}}).reduce((a,v)=>a+v.topics.size,0);
            if(allTopics===1 && !nb.includes("first_topic")){nb.push("first_topic");showToast("Badge : Premier pas 🎯");}
            return {...m,badges:nb};
          });
        }
      }
      const completed=topics.size===week.topics.length;
      if(completed && !cur.completed){
        addXp(XP_WEEK,`+${XP_WEEK} XP — semaine terminée ! 🎉`);
        setMeta(m=>{
          const nb=[...m.badges];
          const doneWeeks=Object.values({...prev,[key]:{topics,completed:true,quizPassed:cur.quizPassed}}).filter(v=>v.completed).length;
          if(doneWeeks===1 && !nb.includes("first_week")){nb.push("first_week");showToast("Badge : Semaine 1 🏁");}
          // Check phase completion
          const phaseDoneKey=`${phaseId}_done`;
          if(!nb.includes(phaseDoneKey)){
            const phaseObj=PROGRAM.find(p=>p.id===phaseId);
            const allDone=phaseObj.weeks.every(w=>{
              const k=`${phaseId}__${w.id}`;
              const wp={...prev,[key]:{topics,completed:true,quizPassed:cur.quizPassed}}[k];
              return wp?.completed;
            });
            if(allDone){nb.push(phaseDoneKey);showToast(`Phase terminée : ${phaseObj.icon} ${phaseObj.title} !`,"level");}
          }
          return {...m,badges:nb};
        });
      }
      return {...prev,[key]:{topics,completed,quizPassed:cur.quizPassed}};

    if(quizState.done) return;
    const phase=PROGRAM.find(p=>p.id===quizState.phaseId);
    const week=phase.weeks.find(w=>w.id===quizState.weekId);
    const q=week.quiz[qIdx];
    const correct=aIdx===q.a;
    const newAnswers=[...quizState.answers,{qIdx,aIdx,correct}];
    if(newAnswers.length===week.quiz.length){

              </div>
              <div style={{background:C.border,borderRadius:99,height:8}}>
                <div style={{height:"100%",borderRadius:99,width:`${lvlPct}%`,background:"linear-gradient(90deg,#6C63FF,#F77F00)"}}/>
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:6}}>{meta.xp.toLocaleString()} / {lvl.max.toLocaleString()} XP pour niveau suivant</div>

            {/* Pomodoro + Next weeks */}

                <div style={{textAlign:"center",margin:"16px 0"}}>
                  <div style={{fontSize:52,fontWeight:900,color:pomodoroPhase==="work"?"#FF6B6B":"#00C9A7",lineHeight:1}}>{fmt(pomodoroSeconds)}</div>

                <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={()=>setPomodoroActive(a=>!a)} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",background:pomodoroActive?"#FF6B6B":"#00C9A7",color:"#fff",fontWeight:700,fontSize:13}}>
                    {pomodoroActive?"⏸ Pause":"▶ Démarrer"}
                  </button>
                  <button onClick={()=>{setPomodoroActive(false);setPomodoroSeconds(25*60);setPomodoroPhase("work");}} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${C.border}`,cursor:"pointer",background:"transparent",color:C.muted,fontSize:13}}>
                    ↺ Reset
                  </button>
                </div>
                <div style={{marginTop:12,textAlign:"center",fontSize:11,color:C.muted}}>
                  🍅 Total : {meta.totalPomodoros} pomodoros · +{XP_POMODORO} XP chacun
                </div>
              </div>

              {/* Next weeks */}
              <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
                <div style={{fontWeight:700,marginBottom:14,color:"#A89CFF"}}>📌 Prochaines semaines</div>
                {PROGRAM.flatMap(p=>p.weeks.map(w=>({...w,phaseId:p.id,phaseColor:p.color,phaseIcon:p.icon}))).filter(w=>{
                  const k=`${w.phaseId}__${w.id}`;
                  return !progress[k]?.completed;
                }).slice(0,5).map(w=>{
                  const k=`${w.phaseId}__${w.id}`;
                  const p=progress[k];
                  const pct=p?Math.round((p.topics.size/w.topics.length)*100):0;
                  return(
                    <div key={w.id} onClick={()=>{setActivePhase(w.phaseId);setActiveWeek(w.id);setTab("week");}} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{fontSize:16,flexShrink:0}}>{w.phaseIcon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{w.title}</div>
                        <div style={{background:C.border,borderRadius:99,height:3,marginTop:4}}>
                          <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:w.phaseColor}}/>
                        </div>
                      </div>
                      <span style={{fontSize:11,color:C.muted,flexShrink:0}}>{pct}%</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Financial milestones */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:700,marginBottom:14,color:"#F7C948"}}>💰 Jalons financiers</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
                {[
                  {m:"Mois 12",role:"Premier freelance",money:"500–2k$/mois",c:"#00C9A7"},
                  {m:"Mois 18",role:"Emploi junior",money:"30–60k$/an",c:"#4FACFE"},
                  {m:"Mois 24",role:"Intermédiaire",money:"60–120k$/an",c:"#6C63FF"},
                  {m:"Mois 36",role:"Senior / Consulting",money:"120–250k$/an",c:"#F7C948"},
                  {m:"Mois 48",role:"Expert / Startup",money:"Illimité 🚀",c:"#F77F00"},
                ].map((j,i)=>(
                  <div key={i} style={{background:C.bg,borderRadius:10,padding:12,border:`1px solid ${j.c}33`}}>
                    <div style={{color:j.c,fontSize:11,fontWeight:700,marginBottom:4}}>{j.m}</div>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{j.role}</div>
                    <div style={{fontSize:13,fontWeight:800,color:j.c}}>{j.money}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── PHASES ── */}
        {tab==="phases"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {PROGRAM.map(p=>(
                <button key={p.id} onClick={()=>setActivePhase(p.id)} style={{
                  padding:"7px 14px",borderRadius:99,border:`1px solid ${activePhase===p.id?p.color:C.border}`,cursor:"pointer",
                  background:activePhase===p.id?`${p.color}22`:"transparent",
                  color:activePhase===p.id?p.color:C.muted,fontWeight:700,fontSize:12,
                }}>
                  {p.icon} Phase {p.phase}
                </button>
              ))}
            </div>
            {(()=>{
              const p=PROGRAM.find(ph=>ph.id===activePhase);
              const ps=getPhaseStats(p);
              return(
                <div>
                  <div style={{background:`linear-gradient(135deg,${p.color}15,${C.card})`,border:`1px solid ${p.color}44`,borderRadius:14,padding:22,marginBottom:20}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:32,marginBottom:6}}>{p.icon}</div>
                        <div style={{fontWeight:800,fontSize:22,marginBottom:4}}>{p.title}</div>
                        <div style={{color:p.accent,fontSize:12,marginBottom:8}}>{p.duration}</div>
                        <div style={{color:"#AAA",fontSize:13,maxWidth:500}}>{p.goal}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:44,fontWeight:900,color:p.color}}>{ps.pct}%</div>
                        <div style={{color:C.muted,fontSize:12}}>{ps.done}/{ps.total} sujets</div>
                        <div style={{color:C.muted,fontSize:12}}>{ps.quizzesPassed}/{p.weeks.length} quiz passés</div>
                      </div>
                    </div>
                    <div style={{background:C.border,borderRadius:99,height:8,marginTop:14}}>
                      <div style={{height:"100%",borderRadius:99,width:`${ps.pct}%`,background:`linear-gradient(90deg,${p.color},${p.accent})`,transition:"width 0.5s"}}/>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                    {p.weeks.map(w=>{
                      const k=`${p.id}__${w.id}`;
                      const wp=progress[k];
                      const doneTops=wp?wp.topics.size:0;
                      const pct=w.topics.length?Math.round((doneTops/w.topics.length)*100):0;
                      return(
                        <div key={w.id} onClick={()=>{setActiveWeek(w.id);setTab("week");}} style={{background:C.card,borderRadius:10,padding:14,cursor:"pointer",border:`1px solid ${wp?.completed?p.color:C.border}`,transition:"all 0.15s"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                            <span style={{fontSize:10,color:p.color,fontWeight:700,textTransform:"uppercase"}}>Semaine {w.week}</span>
                            <div style={{display:"flex",gap:4}}>
                              {wp?.quizPassed&&<span style={{color:"#F7C948",fontSize:12}}>🧪</span>}
                              {wp?.completed&&<span style={{color:"#00C9A7",fontSize:13}}>✓</span>}
                            </div>
                          </div>
                          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>{w.title}</div>
                          <div style={{background:C.bg,borderRadius:99,height:4,marginBottom:6}}>
                            <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:p.color}}/>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted}}>
                            <span>{doneTops}/{w.topics.length}</span><span>{pct}%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* ── WEEK DETAIL ── */}
        {tab==="week"&&(
          <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
            {/* Phase + week list */}
            <div>
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {PROGRAM.map(p=>(
                  <button key={p.id} onClick={()=>{setActivePhase(p.id);setActiveWeek(p.weeks[0].id);}} style={{
                    width:34,height:34,borderRadius:8,border:`1px solid ${activePhase===p.id?p.color:C.border}`,cursor:"pointer",
                    background:activePhase===p.id?`${p.color}22`:"transparent",fontSize:16,
                  }}>{p.icon}</button>
                ))}
              </div>
              <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>
                  {phase?.icon} {phase?.title}
                </div>
                <div style={{maxHeight:520,overflowY:"auto"}}>
                  {phase?.weeks.map(w=>{
                    const k=`${activePhase}__${w.id}`;
                    const wp=progress[k];
                    const p=w.topics.length?Math.round(((wp?.topics.size||0)/w.topics.length)*100):0;
                    return(
                      <div key={w.id} onClick={()=>setActiveWeek(w.id)} style={{
                        padding:"10px 14px",cursor:"pointer",
                        background:activeWeek===w.id?`${phase?.color}18`:"transparent",
                        borderLeft:`3px solid ${activeWeek===w.id?phase?.color:"transparent"}`,
                        borderBottom:`1px solid ${C.border}`,
                      }}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                          <span style={{fontSize:10,color:phase?.color,fontWeight:700}}>Sem.{w.week}</span>
                          <div style={{display:"flex",gap:3}}>
                            {wp?.quizPassed&&<span style={{fontSize:11}}>🧪</span>}
                            {wp?.completed&&<span style={{color:"#00C9A7",fontSize:12}}>✓</span>}
                          </div>
                        </div>
                        <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>{w.title}</div>
                        <div style={{background:C.bg,borderRadius:99,height:3}}>
                          <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:phase?.color}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Week content */}
            <div>
              <div style={{background:`linear-gradient(135deg,${phase?.color}15,${C.card})`,border:`1px solid ${phase?.color}44`,borderRadius:12,padding:20,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:10,color:phase?.color,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Semaine {week?.week}</div>
                    <div style={{fontWeight:800,fontSize:20}}>{week?.title}</div>
                  </div>
                  <button onClick={()=>startQuiz(activePhase,week?.id)} style={{
                    padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",
                    background:weekProgress.quizPassed?"#F7C948":"#6C63FF",color:"#fff",fontWeight:700,fontSize:12,
                  }}>
                    {weekProgress.quizPassed?"✓ Quiz passé":"🧪 Faire le quiz"}
                  </button>
                </div>
                <div style={{background:C.border,borderRadius:99,height:7}}>
                  <div style={{height:"100%",borderRadius:99,width:`${week?.topics.length?Math.round((weekProgress.topics.size/week.topics.length)*100):0}%`,background:`linear-gradient(90deg,${phase?.color},${phase?.accent})`,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:6}}>{weekProgress.topics.size}/{week?.topics.length} sujets · {weekProgress.quizPassed?"Quiz ✓":"Quiz non passé"}</div>
              </div>

              {/* Topics */}
              <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,marginBottom:12}}>
                <div style={{fontWeight:700,marginBottom:12}}>📚 Sujets à maîtriser</div>
                {week?.topics.map((t,i)=>{
                  const checked=weekProgress.topics.has(i);
                  return(
                    <div key={i} style={{
                      display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,marginBottom:5,
                      background:checked?`${phase?.color}15`:C.bg,border:`1px solid ${checked?phase?.color+"44":C.border}`,
                    }}>
                      <div onClick={()=>toggleTopic(activePhase,week.id,i)} style={{width:20,height:20,borderRadius:5,flexShrink:0,background:checked?phase?.color:"transparent",border:`2px solid ${checked?phase?.color:"#444"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",cursor:"pointer"}}>
                        {checked?"✓":""}
                      </div>
                      <span onClick={()=>toggleTopic(activePhase,week.id,i)} style={{fontSize:13,color:checked?C.text:"#AAA",flex:1,cursor:"pointer"}}>{t}</span>
                      <button onClick={()=>setActiveCourse(t)} style={{background:`${phase?.color}22`,border:`1px solid ${phase?.color}44`,borderRadius:6,padding:"3px 8px",cursor:"pointer",color:phase?.color,fontSize:11,fontWeight:700,flexShrink:0}}>
                        📚 Cours
                      </button>
                    </div>
                  );
                })}
              </div>

              {/* Project */}
              {week?.project&&(
                <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${phase?.color}44`,marginBottom:12}}>
                  <div style={{fontWeight:700,marginBottom:8,color:phase?.accent}}>🛠 Projet de la semaine</div>
                  <div style={{fontSize:13,color:"#CCC",lineHeight:1.6}}>{week.project}</div>
                </div>
              )}

              {/* Resources */}
              {week?.resources?.length>0&&(
                <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,marginBottom:10}}>📖 Ressources</div>
                  {week.resources.map((r,i)=>(
                    <div key={i} style={{padding:"7px 10px",background:C.bg,borderRadius:7,marginBottom:5,fontSize:12,color:"#AAA"}}>📌 {r}</div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── QUIZ ── */}
        {tab==="quiz"&&(()=>{
          if(!quizState){
            // Show quiz selector
            return(
              <div>
                <div style={{fontWeight:800,fontSize:20,marginBottom:20}}>🧪 Quiz par semaine</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                  {PROGRAM.flatMap(p=>p.weeks.map(w=>({...w,phaseId:p.id,phaseColor:p.color,phaseIcon:p.icon,phaseTitle:p.title}))).map(w=>{
                    const k=`${w.phaseId}__${w.id}`;
                    const wp=progress[k];
                    return(
                      <div key={w.id} style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${wp?.quizPassed?"#F7C948":C.border}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span style={{fontSize:10,color:w.phaseColor,fontWeight:700}}>{w.phaseIcon} Ph.{PROGRAM.findIndex(p=>p.id===w.phaseId)} · Sem.{w.week}</span>
                          {wp?.quizPassed&&<span style={{color:"#F7C948"}}>🧪✓</span>}
                        </div>
                        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>{w.title}</div>
                        <button onClick={()=>startQuiz(w.phaseId,w.id)} style={{
                          width:"100%",padding:"7px",borderRadius:7,border:"none",cursor:"pointer",
                          background:wp?.quizPassed?"rgba(247,201,72,0.15)":"rgba(108,99,255,0.2)",
                          color:wp?.quizPassed?"#F7C948":"#A89CFF",fontWeight:600,fontSize:12,
                        }}>
                          {wp?.quizPassed?"Refaire le quiz":"Commencer le quiz"}
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }

          const qPhase=PROGRAM.find(p=>p.id===quizState.phaseId);
          const qWeek=qPhase.weeks.find(w=>w.id===quizState.weekId);
          const currentQ=quizState.answers.length;

          if(quizState.done){
            const perfect=quizState.score===qWeek.quiz.length;
            return(
              <div style={{maxWidth:600,margin:"0 auto",textAlign:"center"}}>
                <div style={{fontSize:60,marginBottom:16}}>{perfect?"🌟":quizState.score>=3?"✅":"💪"}</div>
                <div style={{fontWeight:800,fontSize:28,marginBottom:8}}>
                  {quizState.score}/{qWeek.quiz.length} bonnes réponses
                </div>
                <div style={{color:C.muted,fontSize:15,marginBottom:24}}>
                  {perfect?"Parfait ! Tu maîtrises ce sujet.":quizState.score>=3?"Bonne progression !":"Continue à étudier et réessaie."}
                </div>
                {/* Review */}
                <div style={{textAlign:"left",marginBottom:24}}>
                  {qWeek.quiz.map((q,i)=>{
                    const ans=quizState.answers[i];
                    return(
                      <div key={i} style={{background:C.card,borderRadius:10,padding:14,marginBottom:10,border:`1px solid ${ans?.correct?"#00C9A7":"#FF6B6B"}33`}}>
                        <div style={{fontWeight:600,marginBottom:8,fontSize:13}}>{i+1}. {q.q}</div>
                        {q.choices.map((c,ci)=>(
                          <div key={ci} style={{padding:"6px 10px",borderRadius:6,marginBottom:4,fontSize:12,
                            background:ci===q.a?"rgba(0,201,167,0.15)":ci===ans?.aIdx&&!ans?.correct?"rgba(255,107,107,0.15)":"transparent",
                            color:ci===q.a?"#00C9A7":ci===ans?.aIdx&&!ans?.correct?"#FF6B6B":C.muted,
                          }}>
                            {ci===q.a?"✓ ":ci===ans?.aIdx&&!ans?.correct?"✗ ":""}{c}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={()=>setQuizState(null)} style={{padding:"10px 20px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700}}>
                    Tous les quiz
                  </button>
                  <button onClick={()=>startQuiz(quizState.phaseId,quizState.weekId)} style={{padding:"10px 20px",borderRadius:8,border:`1px solid ${C.border}`,cursor:"pointer",background:"transparent",color:C.muted,fontWeight:700}}>
                    Réessayer
                  </button>
                </div>
              </div>
            );
          }

          const q=qWeek.quiz[currentQ];
          return(
            <div style={{maxWidth:600,margin:"0 auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={()=>setQuizState(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.muted,fontSize:13}}>← Retour</button>
                <span style={{color:C.muted,fontSize:13}}>{qPhase.icon} {qWeek.title}</span>
                <span style={{color:"#6C63FF",fontWeight:700,fontSize:13}}>{currentQ+1}/{qWeek.quiz.length}</span>
              </div>
              <div style={{background:C.border,borderRadius:99,height:6,marginBottom:24}}>
                <div style={{height:"100%",borderRadius:99,width:`${(currentQ/qWeek.quiz.length)*100}%`,background:qPhase.color,transition:"width 0.3s"}}/>
              </div>
              <div style={{background:C.card,borderRadius:14,padding:24,border:`1px solid ${C.border}`,marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{q.q}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {q.choices.map((c,ci)=>(
                  <button key={ci} onClick={()=>answerQuiz(currentQ,ci)} style={{
                    padding:"14px 18px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",
                    background:C.card,color:C.text,fontWeight:600,fontSize:14,textAlign:"left",
                    transition:"all 0.15s",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=qPhase.color}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                    <span style={{color:C.muted,marginRight:10}}>{["A","B","C","D"][ci]}.</span>{c}
                  </button>
                ))}
              </div>
            </div>
          );
        })()}

        {/* ── JOURNAL ── */}
        {tab==="journal"&&(
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <div style={{fontWeight:800,fontSize:20,marginBottom:20}}>📖 Journal d'apprentissage</div>
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:10}}>Nouvelle entrée — <span style={{color:C.muted,fontWeight:400,fontSize:12}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</span></div>
              <textarea
                value={journalEntry}
                onChange={e=>setJournalEntry(e.target.value)}
                placeholder="Qu'as-tu appris aujourd'hui ? Quelles difficultés as-tu rencontrées ? Qu'est-ce qui t'a surpris ?"
                style={{width:"100%",minHeight:120,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:12,color:C.text,fontSize:13,resize:"vertical",lineHeight:1.6,boxSizing:"border-box",outline:"none"}}
              />
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
                <span style={{fontSize:11,color:C.muted}}>+{XP_JOURNAL} XP par entrée · {journalHistory.length} entrées au total</span>
                <button onClick={saveJournal} style={{padding:"8px 18px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700,fontSize:13}}>
                  Sauvegarder
                </button>
              </div>
            </div>
            {journalHistory.length===0?(
              <div style={{textAlign:"center",color:C.muted,padding:40}}>Aucune entrée. Commence à écrire !</div>
            ):(
              journalHistory.map((e,i)=>(
                <div key={i} style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,marginBottom:12}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{new Date(e.date).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"})}</div>
                  <div style={{fontSize:13,lineHeight:1.7,color:"#CCC",whiteSpace:"pre-wrap"}}>{e.text}</div>
                </div>
              ))
            )}
          </div>
        )}

        {/* ── BADGES ── */}
        {tab==="badges"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:20}}>🏆 Badges & Récompenses</div>
              <div style={{color:C.muted,fontSize:13}}>{meta.badges.length}/{BADGES.length} débloqués</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
              {BADGES.map(b=>{
                const unlocked=meta.badges.includes(b.id);
                return(
                  <div key={b.id} style={{background:C.card,borderRadius:12,padding:18,textAlign:"center",border:`1px solid ${unlocked?"#F7C948":"#1A1D2E"}`,opacity:unlocked?1:0.45}}>
                    <div style={{fontSize:36,marginBottom:8,filter:unlocked?"none":"grayscale(1)"}}>{b.icon}</div>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:unlocked?"#F7C948":C.muted}}>{b.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{b.desc}</div>
                    {unlocked&&<div style={{marginTop:8,fontSize:10,color:"#F7C948"}}>✓ Débloqué</div>}
                  </div>
                );
              })}
            </div>
            {/* Levels */}
            <div style={{fontWeight:800,fontSize:18,marginBottom:16}}>⬆️ Niveaux XP</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
              {LEVELS.map((l,i)=>{
                const current=getLevel(meta.xp).level===i+1;
                const done=meta.xp>=l.min;
                return(
                  <div key={i} style={{background:C.card,borderRadius:10,padding:14,textAlign:"center",border:`1px solid ${current?"#6C63FF":done?"#6C63FF33":C.border}`}}>
                    <div style={{fontSize:28,marginBottom:6}}>{l.icon}</div>
                    <div style={{fontWeight:700,fontSize:12,color:current?"#A89CFF":done?"#6C63FF66":C.muted}}>Lv.{i+1}</div>
                    <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>{l.name}</div>
                    <div style={{fontSize:10,color:C.muted}}>{l.min.toLocaleString()} XP</div>
                    {current&&<div style={{marginTop:6,fontSize:10,color:"#A89CFF",fontWeight:700}}>← Tu es ici</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── PLANNING ── */}
        {tab==="plan"&&(
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <div style={{fontWeight:800,fontSize:20,marginBottom:6}}>🗓 Planning hebdomadaire</div>
            <div style={{color:C.muted,fontSize:13,marginBottom:20}}>Basé sur ton avancement actuel · 3–4h/jour recommandées</div>

            {/* Daily schedule */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:16}}>📅 Répartition quotidienne type</div>
              {[
                {time:"07:00–08:00",task:"📚 Théorie : lire, regarder des vidéos, prendre des notes",color:"#6C63FF"},
                {time:"08:00–09:30",task:"💻 Pratique : coder, résoudre des exercices",color:"#00C9A7"},
                {time:"09:30–10:15",task:"🛠 Projet personnel en cours",color:"#FF6B6B"},
                {time:"10:15–10:30",task:"🗞 Veille tech : Hacker News, Twitter, arXiv",color:"#F7C948"},
              ].map((s,i)=>(
                <div key={i} style={{display:"flex",gap:14,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,fontSize:12,color:s.color,flexShrink:0,width:120}}>{s.time}</div>
                  <div style={{fontSize:13,color:"#CCC"}}>{s.task}</div>
                </div>
              ))}
            </div>

            {/* This week plan */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:16}}>🗓 Plan de la semaine à venir</div>
              {getWeeklyPlan().map((d,i)=>(
                <div key={i} style={{display:"flex",gap:14,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,fontSize:12,color:"#A89CFF",flexShrink:0,width:80}}>{d.day}</div>
                  <div style={{fontSize:13,color:"#CCC"}}>{d.task}</div>
                </div>
              ))}
            </div>

            {/* Anti-procrastination rules */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid #FF6B6B44`}}>
              <div style={{fontWeight:700,marginBottom:14,color:"#FF6B6B"}}>⚠️ Règles anti-triche & anti-abandon</div>
              {[
                "Ne coche un sujet ✓ que si tu peux l'expliquer à voix haute à quelqu'un.",
                "Ne passe pas à la semaine suivante sans avoir fait le projet pratique.",
                "Ne passe pas à la semaine suivante sans avoir réussi le quiz (≥ 3/4).",
                "Si tu sautes un jour, pas de panique : reprends le lendemain, pas de double charge.",
                "Si tu bloques plus de 30 min sur un sujet, cherche une autre ressource. Ne reste pas bloqué.",
                "Commit du code sur GitHub chaque jour où tu codes. Pas de commit = pas de session.",
                "Partage ton avancement avec quelqu'un une fois par semaine (ami, forum, Discord).",
              ].map((r,i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:"#FF6B6B",fontWeight:700,flexShrink:0}}>{i+1}.</span>
                  <span style={{fontSize:13,color:"#CCC",lineHeight:1.5}}>{r}</span>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* COURSE MODAL */}
      {activeCourse && (
        <CourseModal
          topic={activeCourse}
          phaseColor={phase?.color||"#6C63FF"}
          onClose={()=>setActiveCourse(null)}
        />
      )}

      <style>{`
        @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:#0F1118} ::-webkit-scrollbar-thumb{background:#2A2D40;border-radius:3px}
        button:hover{filter:brightness(1.1)}
        textarea:focus{border-color:#6C63FF !important}
      `}</style>
    </div>
  );
}
