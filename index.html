"CPU, RAM, stockage, OS":{
cours:`## 🎯 C'est quoi ?
Un ordinateur est composé de 4 éléments : CPU (cerveau), RAM (mémoire de travail), Stockage (mémoire permanente) et OS (chef d'orchestre).

## 🔍 Comment ça marche ?
▸ **CPU** — Le cerveau. Exécute toutes les instructions. Vitesse en GHz.
▸ **RAM** — Mémoire temporaire. Comme un bureau. S'efface à l'extinction.
▸ **Stockage SSD/HDD** — Mémoire permanente. Reste après extinction.
▸ **OS** — Chef d'orchestre. Gère tout le matériel. Ex : Windows, Linux, Android.

## 💡 Points clés
▸ CPU = cerveau, fait les calculs
▸ RAM = mémoire temporaire (perdue à l'extinction)
▸ Stockage = mémoire permanente
▸ OS = logiciel qui coordonne tout
▸ Ces 4 travaillent ensemble en permanence

## 🌍 Pourquoi c'est important ?
96% des serveurs web tournent sur Linux. AWS, Docker nécessitent ces bases. Savoir pourquoi ton programme rame = compétence d'ingénieur.`,
exemple:`## 📌 Exemple 1 : Ouvrir Chrome
1. Tu cliques → l'OS reçoit le clic
2. L'OS lit Chrome depuis le stockage
3. La RAM charge Chrome pour accès rapide
4. Le CPU exécute le code et affiche l'interface
Tout ça en moins d'une seconde !

## 📌 Exemple 2 : Ton téléphone Android
▸ CPU : Snapdragon ou MediaTek (cerveau)
▸ RAM : 4-8GB (apps ouvertes simultanément)
▸ Stockage : 64-256GB (photos, apps, musique)
▸ OS : Android (gère tout)

## 📌 Exemple 3 : Pourquoi ça rame ?
10 onglets Chrome + Spotify + jeu :
▸ RAM saturée → OS utilise le stockage comme RAM
▸ Le stockage est 10x plus lent que la RAM
▸ Résultat : tout rame !
Solution : fermer des programmes ou ajouter de la RAM.`,
exercice:`## ✏️ Exercice 1 (Facile)
▸ Va dans Paramètres → À propos du téléphone
▸ Note le CPU, RAM, stockage et version OS
▸ Recherche les specs de ton CPU sur Google

## ✏️ Exercice 2 (Moyen)
Sur Windows, ouvre le Gestionnaire des tâches (Ctrl+Shift+Échap) :
▸ Quel % du CPU est utilisé ?
▸ Combien de RAM est utilisée ?
▸ Quel programme consomme le plus ?

## ✏️ Exercice 3 (Défi)
▸ Dessine le schéma des 4 composants
▸ Ajoute des flèches montrant les communications
▸ Explique le schéma à voix haute`},

"Binaire & hexadécimal":{
cours:`## 🎯 C'est quoi ?
Les ordinateurs ne comprennent que 0 et 1 (binaire). L'hexadécimal est un système à 16 symboles pour représenter les données de façon compacte.

## 🔍 Comment ça marche ?
▸ **Binaire (base 2)** : 0 et 1. Positions : 128,64,32,16,8,4,2,1.
  Exemple : 1010 = 8+0+2+0 = 10 en décimal
▸ **Hexadécimal (base 16)** : 0-9 puis A=10,B=11,C=12,D=13,E=14,F=15.
  FF = 15×16+15 = 255. Utilisé pour les couleurs (#FF6B6B).
▸ **Conversion décimal → binaire** : diviser par 2, noter les restes de bas en haut.

## 💡 Points clés
▸ 1 bit = un 0 ou un 1
▸ 8 bits = 1 octet (byte)
▸ 1 Ko = 1024 octets, 1 Mo = 1024 Ko, 1 Go = 1024 Mo
▸ Hex utilisé pour couleurs CSS, adresses mémoire, permissions

## 🌍 Pourquoi c'est important ?
Permissions Linux (chmod 755), couleurs CSS, adresses IP — tout repose sur le binaire et l'hexadécimal.`,
exemple:`## 📌 Exemple 1 : Convertir 13 en binaire
13 ÷ 2 = 6 reste 1
6 ÷ 2 = 3 reste 0
3 ÷ 2 = 1 reste 1
1 ÷ 2 = 0 reste 1
Lire de bas en haut : 1101
Vérif : 8+4+0+1 = 13 ✓

## 📌 Exemple 2 : Couleurs hexadécimales
#FF0000 = rouge pur (FF=255 rouge)
#00FF00 = vert pur
#0000FF = bleu pur
#FFFFFF = blanc (tout au max)
#000000 = noir (tout à zéro)
#6C63FF = le violet de ton app TechRoadmap !

## 📌 Exemple 3 : Tailles de fichiers
2^10 = 1024 (pourquoi pas 1000 ? Car base 2 !)
1024 octets = 1 Ko
1024 Ko = 1 Mo
1024 Mo = 1 Go
Un film HD = ~4 Go`,
exercice:`## ✏️ Exercice 1 (Facile)
Convertis en binaire :
▸ 5 → ? (réponse : 101)
▸ 10 → ? (réponse : 1010)
▸ 15 → ? (réponse : 1111)
▸ 8 → ? (réponse : 1000)

## ✏️ Exercice 2 (Moyen)
Convertis ces binaires en décimal :
▸ 0111 → ? (7)
▸ 1001 → ? (9)
▸ 1111 → ? (15)
▸ 10000 → ? (16)

## ✏️ Exercice 3 (Défi)
▸ Convertis 255 en hexadécimal → FF
▸ Quelle couleur CSS est #00FF00 ? (vert pur)
▸ Calcule : combien d'octets dans 2 Go ?`},

"Navigation terminal : ls, cd, mkdir, cp, chmod":{
cours:`## 🎯 C'est quoi ?
Le terminal est l'outil principal de tout développeur. Tu contrôles l'ordinateur en tapant des commandes texte.

## 🔍 Les commandes essentielles
▸ **ls** — Liste le contenu du dossier. ls -la = détaillé avec permissions.
▸ **cd** — Change de dossier. cd Documents, cd ..(remonter), cd ~(home).
▸ **mkdir** — Crée un dossier. mkdir -p a/b/c crée la hiérarchie.
▸ **cp** — Copie. cp source.txt copie.txt. cp -r dossier/ copie/ pour dossiers.
▸ **chmod** — Modifie permissions. chmod +x script.sh. chmod 755.
▸ **mv** — Déplace/renomme. **rm** — Supprime (attention !).

## 💡 Points clés
▸ Le terminal distingue majuscules et minuscules !
▸ Tab = autocomplétion (très utile !)
▸ Flèche haut = commande précédente
▸ Ctrl+C = annuler une commande
▸ man ls = affiche l'aide de ls

## 🌍 Pourquoi c'est important ?
Sur un serveur Linux, pas d'interface graphique. Tout se fait en terminal.`,
exemple:`## 📌 Exemple 1 : Créer un projet
cd ~
mkdir mon-projet
cd mon-projet
mkdir src tests docs
touch README.md
ls

## 📌 Exemple 2 : Copier et organiser
cp index.html index_backup.html
cp -r src/ src_backup/
ls -la

## 📌 Exemple 3 : Permissions chmod
touch script.sh
chmod +x script.sh
ls -la script.sh
# -rwxr-xr-x script.sh
./script.sh`,

"IP, DNS, HTTP, client/serveur":{
cours:`## 🎯 C'est quoi ?
Internet fonctionne grâce à des protocoles standardisés. IP adresse les machines, DNS traduit les noms en IP, HTTP transfère les pages web.

## 🔍 Comment ça marche ?
▸ **IP** — Adresse unique de chaque appareil. Ex : 192.168.1.1 (local), 8.8.8.8 (Google).
▸ **DNS** — Annuaire d'internet. Traduit "google.com" → IP. Sans DNS, tu mémoriserais des IPs !
▸ **HTTP/HTTPS** — Protocole web. HTTPS = chiffré. Port 80 (HTTP), 443 (HTTPS).
▸ **Client/Serveur** — Ton navigateur (client) envoie une requête, le serveur répond.

## 💡 Points clés
▸ DNS = annuaire (nom → IP)
▸ HTTPS = HTTP chiffré (toujours préférer)
▸ Port 80 = HTTP, Port 443 = HTTPS
▸ 200 = OK, 404 = Non trouvé, 500 = Erreur serveur

## 🌍 Pourquoi c'est important ?
Tout développeur web travaille avec ces protocoles. La cybersécurité repose sur leur compréhension.`,
exemple:`## 📌 Exemple 1 : Ouvrir google.com
1. Navigateur demande au DNS : IP de google.com ?
2. DNS répond : 142.250.74.46
3. Navigateur envoie : GET / HTTP/1.1 Host: google.com
4. Serveur répond avec le HTML
5. Navigateur affiche la page

## 📌 Exemple 2 : Requête HTTP
GET /index.html HTTP/1.1
Host: www.example.com
User-Agent: Chrome/100
Le serveur répond :
HTTP/1.1 200 OK
Content-Type: text/html

## 📌 Exemple 3 : Adresses importantes
192.168.1.1 → routeur de ta maison
8.8.8.8 → DNS Google
127.0.0.1 → localhost (toi-même)
Teste : ping google.com`,
exercice:`## ✏️ Exercice 1 (Facile)
▸ ping google.com → note l'adresse IP
▸ nslookup facebook.com → quelle IP ?
▸ ipconfig (Windows) → quelle est ton IP locale ?

"Python : boucles for/while":{
cours:`## 🎯 C'est quoi ?
Les boucles répètent des instructions automatiquement. Sans elles, tu devrais écrire 1000 fois la même ligne pour 1000 calculs.

## 🔍 Comment ça marche ?
▸ **for** : for i in range(5): → 0,1,2,3,4
▸ **while** : while condition: → répète TANT QUE vrai
▸ **break** → sortir de la boucle
▸ **continue** → passer à l'itération suivante

## 💡 Points clés
▸ for = quand tu sais combien de fois répéter
▸ while = quand tu ne sais pas à l'avance
▸ Attention aux boucles infinies !
▸ range(10) = 0 à 9 (pas 10 !)

## 🌍 Pourquoi c'est important ?
Les boucles = l'automatisation. Analyser des millions de données, entraîner des modèles ML — tout utilise des boucles.`,
exemple:`## 📌 Exemple 1 : Boucle for

    print(i)  # 0,1,2,3,4

## 📌 Exemple 2 : Boucle while

    print(compteur)

## 📌 Exemple 3 : Break et continue
for i in range(10):
    if i == 5:
        break  # Arrête à 5

for i in range(10):
    if i % 2 == 0:
        continue  # Saute les pairs
    print(i)  # 1,3,5,7,9`,

"Fonctions et portée":{
cours:`## 🎯 C'est quoi ?
Une fonction est un bloc de code réutilisable qui effectue une tâche précise. La portée définit où une variable est accessible.

## 🔍 Comment ça marche ?
▸ **def nom(params):** — Définir une fonction
▸ **return** — Retourner une valeur
▸ **Portée locale** — Variable dans une fonction, accessible seulement dedans
▸ **Portée globale** — Variable hors fonction, accessible partout
▸ **Paramètres par défaut** : def f(x, y=10)

## 💡 Points clés
▸ DRY = Don't Repeat Yourself
▸ Une fonction = une tâche précise
▸ Noms en snake_case : calculer_bmi
▸ Variables locales disparaissent après l'appel

## 🌍 Pourquoi c'est important ?
Les fonctions sont la base de tout programme. En ML, chaque étape est une fonction.`,
exemple:`## 📌 Exemple 1 : Fonction simple
def saluer(nom):
    return "Bonjour " + nom + " !"

print(saluer("ICHOLA"))  # Bonjour ICHOLA !

## 📌 Exemple 2 : Portée (scope)
x = 10  # Global

def ma_fonction():
    y = 20  # Local
    print(x)  # OK : x est global
    # y n'est accessible que dedans

## 📌 Exemple 3 : Fonctions multiples
def surface(l, L):
    return l * L

def perimetre(l, L):
    return 2 * (l + L)

print(surface(5, 3))     # 15
print(perimetre(5, 3))   # 16`,

"Lire/écrire fichiers":{
cours:`## 🎯 C'est quoi ?
Lire et écrire des fichiers permet à Python de persister des données : sauvegarder des résultats, lire des configurations, traiter des CSV et JSON.

## 🔍 Comment ça marche ?
▸ **open(fichier, mode)** — Modes : 'r'(lecture), 'w'(écriture), 'a'(ajout)
▸ **with open(...) as f:** — Ferme automatiquement le fichier
▸ **f.read()** — Lit tout le fichier
▸ **f.write(texte)** — Écrit dans le fichier
▸ **json.load() / json.dump()** — Lire/écrire du JSON

## 💡 Points clés
▸ Toujours utiliser with open() — fermeture automatique
▸ 'w' ÉCRASE le fichier existant !
▸ 'a' ajoute à la fin
▸ encoding='utf-8' pour les caractères spéciaux

## 🌍 Pourquoi c'est important ?
En data engineering, tu liras des millions de lignes CSV. En cybersécurité, tu analyseras des logs.`,
exemple:`## 📌 Exemple 1 : Lecture/écriture texte
with open("notes.txt", "w", encoding="utf-8") as f:
    f.write("Première ligne\n")
    f.write("Deuxième ligne\n")

with open("notes.txt", "r") as f:
    for ligne in f:
        print(ligne.strip())

## 📌 Exemple 2 : JSON
import json

data = {"nom":"ICHOLA","age":20,"notes":[15,18,12]}
with open("etudiant.json","w") as f:
    json.dump(data, f, indent=4)

with open("etudiant.json","r") as f:
    d = json.load(f)
    print(d["nom"])  # ICHOLA

## 📌 Exemple 3 : CSV
import csv

with open("notes.csv","w",newline="") as f:
    w = csv.writer(f)
    w.writerow(["Nom","Note"])
    w.writerow(["ICHOLA",18])`,

"Modules os, sys, json":{
cours:`## 🎯 C'est quoi ?
Python a une bibliothèque standard immense. os, sys et json sont parmi les modules les plus utilisés en développement professionnel.

## 🔍 Module os
▸ os.getcwd() → dossier actuel
▸ os.listdir() → liste les fichiers
▸ os.makedirs("a/b", exist_ok=True) → crée des dossiers
▸ os.path.exists() → vérifie l'existence
▸ os.path.join() → construit des chemins

## 🔍 Module sys
▸ sys.argv → arguments de la ligne de commande
▸ sys.exit(code) → quitter le programme

## 🔍 Module json
▸ json.loads(str) → string JSON → Python
▸ json.dumps(obj) → Python → string JSON

## 💡 Points clés
▸ os.path.join() préférable aux "/" manuels
▸ JSON = format universel d'échange de données
▸ sys.argv[0] = nom du script, [1] = premier argument

## 🌍 Pourquoi c'est important ?
Ces modules sont dans 90% des scripts Python professionnels.`,
exemple:`## 📌 Exemple 1 : Module os
import os

print(os.getcwd())  # dossier actuel
fichiers = os.listdir(".")
os.makedirs("projet/src", exist_ok=True)
if os.path.exists("config.json"):
    print("Config trouvée !")

## 📌 Exemple 2 : Module sys
import sys

if len(sys.argv) < 2:
    print("Usage: python script.py <nom>")
    sys.exit(1)
print("Bonjour", sys.argv[1])

## 📌 Exemple 3 : JSON + os
import os, json

def charger_config():
    chemin = os.path.join(os.getcwd(),"config.json")
    if os.path.exists(chemin):
        with open(chemin) as f:
            return json.load(f)
    return {}`,
exercice:`## ✏️ Exercice 1 (Facile)

▸ Liste tous les fichiers du dossier actuel
▸ Crée un dossier "test_os" avec os.mkdir()

## ✏️ Exercice 2 (Moyen)

▸ Prend un prénom en argument
▸ Sans argument → affiche l'usage
▸ Avec argument → "Bonjour [prenom] !"

## ✏️ Exercice 3 (Défi)

▸ charger_config(fichier) → dict ou {}

"Gestion d'erreurs (try/except)":{
cours:`## 🎯 C'est quoi ?
La gestion d'erreurs permet à ton programme de réagir intelligemment aux problèmes au lieu de planter. try/except = le filet de sécurité du code professionnel.

## 🔍 Comment ça marche ?
▸ **try** — Le code qui pourrait générer une erreur
▸ **except TypeErreur** — Ce qui se passe si erreur
▸ **else** — Exécuté seulement si pas d'erreur
▸ **finally** — Toujours exécuté (avec ou sans erreur)
▸ **raise** — Lever une exception manuellement

Erreurs courantes : ValueError, ZeroDivisionError, FileNotFoundError, KeyError, IndexError

## 💡 Points clés
▸ Ne jamais utiliser except: seul (trop large !)
▸ Capturer les exceptions spécifiques
▸ finally pour nettoyer (fermer fichiers, connexions)

## 🌍 Pourquoi c'est important ?
Un programme professionnel ne plante jamais. Les erreurs non gérées font planter les serveurs en production.`,
exemple:`## 📌 Exemple 1 : try/except basique
try:
    nombre = int(input("Entrez un nombre: "))
    resultat = 100 / nombre
    print("Résultat:", resultat)
except ValueError:
    print("Ce n'est pas un nombre !")
except ZeroDivisionError:
    print("Division par zéro !")

## 📌 Exemple 2 : else et finally
try:
    fichier = open("data.txt","r")
    contenu = fichier.read()
except FileNotFoundError:
    print("Fichier introuvable !")
else:
    print("Lu avec succès !")
finally:
    print("Opération terminée")

## 📌 Exemple 3 : Exception personnalisée
class AgeInvalide(Exception):
    pass

def verifier_age(age):
    if age < 0:
        raise AgeInvalide("Âge négatif impossible !")
    return True`,
exercice:`## ✏️ Exercice 1 (Facile)
Calculatrice sécurisée :
▸ Demande deux nombres
▸ Gère ValueError si texte entré
▸ Gère ZeroDivisionError

## ✏️ Exercice 2 (Moyen)
Lecteur de fichier robuste :
▸ FileNotFoundError → "Voulez-vous le créer ?"
▸ PermissionError → "Pas de permission"
▸ finally → "Fin de l'opération"

## ✏️ Exercice 3 (Défi)
▸ EmailInvalide(Exception) si pas de "@"
▸ MotDePasseFaible si < 8 caractères
▸ inscription(email, mdp) → valide les deux`},

"Complexité O(n)":{
cours:`## 🎯 C'est quoi ?
La notation Big O décrit comment le temps d'exécution d'un algorithme évolue en fonction de la taille des données.

## 🔍 Les complexités principales
▸ **O(1)** — Constant. Accès à un tableau par index.
▸ **O(log n)** — Logarithmique. Recherche binaire.
▸ **O(n)** — Linéaire. Parcours d'une liste.
▸ **O(n log n)** — Tri efficace (merge sort, quicksort).
▸ **O(n²)** — Deux boucles imbriquées. Lent !
▸ **O(2ⁿ)** — Exponentiel. Très lent !

## 💡 Points clés
▸ On analyse le pire cas
▸ Les constantes sont ignorées : O(2n) = O(n)
▸ Pour n=1000 : O(n)=1000 ops, O(n²)=1,000,000 ops !
▸ dict["clé"] = O(1) (table de hachage)

## 🌍 Pourquoi c'est important ?
Les entretiens Google/Amazon testent systématiquement la complexité. Un mauvais algorithme = serveur qui plante en production.`,
exemple:`## 📌 Exemple 1 : O(1) vs O(n)
def premier_element(liste):
    return liste[0]  # O(1) - toujours 1 opération

def trouver_max(liste):
    m = liste[0]
    for e in liste:  # O(n) - n opérations
        if e > m:
            m = e
    return m

## 📌 Exemple 2 : O(n²) amélioré en O(n)
# O(n²) - double boucle
def doublons_lent(liste):
    for i in range(len(liste)):
        for j in range(i+1,len(liste)):
            if liste[i]==liste[j]:
                return True
    return False

# O(n) - avec un set
def doublons_rapide(liste):
    vus = set()
    for e in liste:
        if e in vus: return True
        vus.add(e)
    return False

## 📌 Exemple 3 : Mesurer le temps
import time

liste = list(range(10000))
for fn in [doublons_lent, doublons_rapide]:
    debut = time.time()
    fn(liste)
    print(f"{fn.__name__}: {time.time()-debut:.4f}s")`,
exercice:`## ✏️ Exercice 1 (Facile)
Identifie la complexité :
▸ liste[5] → O(?)
▸ Parcourir n éléments → O(?)
▸ Deux boucles imbriquées sur n → O(?)
▸ dict["clé"] → O(?)

## ✏️ Exercice 2 (Moyen)
▸ Chercher dans une liste (O(n)) vs set (O(1))
▸ Mesure le temps pour une liste de 100000 éléments
▸ Améliore le code de doublons de O(n²) à O(n)

## ✏️ Exercice 3 (Défi)
▸ Recherche linéaire vs binaire
▸ Liste de 1 million d'éléments
▸ Mesure et compare les temps`},

"SELECT, WHERE, ORDER BY":{
cours:`## 🎯 C'est quoi ?
SQL est le langage universel pour interroger les bases de données. SELECT, WHERE, ORDER BY sont les bases de toute requête SQL.

## 🔍 Les commandes
▸ **SELECT col FROM table** — Choisir les colonnes
▸ **WHERE condition** — Filtrer les lignes
▸ **ORDER BY col ASC/DESC** — Trier
▸ **LIMIT n** — Limiter le nombre de résultats
▸ Opérateurs : =, !=, >, <, LIKE, IN, AND, OR

## 💡 Points clés
▸ SQL n'est pas sensible à la casse
▸ Les strings entre guillemets simples : 'Alice'
▸ NULL = valeur manquante (IS NULL, IS NOT NULL)
▸ LIKE 'A%' = commence par A

## 🌍 Pourquoi c'est important ?
Toutes les entreprises utilisent des bases de données SQL. Data analyst, data engineer, développeur backend — tout le monde a besoin de SQL.`,
exemple:`## 📌 Exemple 1 : SELECT basique
SELECT * FROM etudiants;
SELECT nom, age, ville FROM etudiants;
SELECT nom AS prenom FROM etudiants;

## 📌 Exemple 2 : WHERE et filtres
SELECT * FROM etudiants WHERE ville = 'Cotonou';
SELECT nom, age FROM etudiants WHERE age >= 18;
SELECT * FROM etudiants WHERE nom LIKE 'M%';
SELECT * FROM etudiants
WHERE age >= 18 AND ville = 'Cotonou';

## 📌 Exemple 3 : ORDER BY et LIMIT
SELECT nom, age FROM etudiants ORDER BY age ASC;
SELECT nom, note FROM etudiants
ORDER BY note DESC LIMIT 5;`,

"JOINs (INNER, LEFT, RIGHT)":{
cours:`## 🎯 C'est quoi ?
Les JOINs combinent des données de plusieurs tables en utilisant une relation commune.

## 🔍 Types de JOINs
▸ **INNER JOIN** — Seulement les lignes correspondantes dans les DEUX tables.
▸ **LEFT JOIN** — TOUTES les lignes de gauche + correspondances droite (NULL si absent).
▸ **RIGHT JOIN** — Toutes les lignes de droite + correspondances gauche.

Syntaxe :
SELECT col1 FROM table1
INNER JOIN table2 ON table1.id = table2.fk_id

## 💡 Points clés
▸ ON définit la condition de jointure
▸ Toujours préciser la table : table.colonne
▸ Les alias rendent le code plus lisible
▸ LEFT JOIN pour les rapports (garder toutes les données)

## 🌍 Pourquoi c'est important ?
Dans toute base de données réelle, les données sont dans plusieurs tables. Les JOINs permettent de les combiner efficacement.`,
exemple:`## 📌 Exemple 1 : INNER JOIN
-- Étudiants avec leur cours
SELECT e.nom, c.titre, c.professeur
FROM etudiants e
INNER JOIN cours c ON e.cours_id = c.id;

## 📌 Exemple 2 : LEFT JOIN
-- Tous les étudiants, même sans cours
SELECT e.nom, c.titre
FROM etudiants e
LEFT JOIN cours c ON e.cours_id = c.id;
-- Si pas de cours → titre = NULL

## 📌 Exemple 3 : JOINs multiples
SELECT cl.nom, p.nom, co.quantite, p.prix*co.quantite AS total
FROM commandes co
INNER JOIN clients cl ON co.client_id = cl.id
INNER JOIN produits p ON co.produit_id = p.id
ORDER BY total DESC;`,
exercice:`## ✏️ Exercice 1 (Facile)

▸ LEFT JOIN : tous les clients, même sans commande

## ✏️ Exercice 3 (Défi)
Base école : etudiants, cours, notes
▸ Moyenne par étudiant dans chaque cours
▸ Étudiants sans aucune note`},

function CourseModal({topic, phaseColor, onClose}) {
  const [tab, setTab] = useState("cours");
  const C = { bg:"#07080D", card:"#0F1118", border:"#1A1D2E", text:"#E2E4F0", muted:"#5A5F7A" };

  const courseData = COURSES[topic] || getDefaultCourse(topic);
  const content = courseData[tab];

  function renderMd(text) {
    const lines = text.split("\n");
    return lines.map((line, i) => {
      if(line.startsWith("## ")) return <div key={i} style={{fontWeight:800,fontSize:15,color:phaseColor,margin:"16px 0 8px",borderBottom:`1px solid ${phaseColor}33`,paddingBottom:6}}>{line.replace("## ","")}</div>;
      if(line.startsWith("▸ **") || line.startsWith("**")) {
        const parts = line.split("**");
        return <div key={i} style={{display:"flex",gap:8,padding:"5px 0",alignItems:"flex-start"}}>
          {line.startsWith("▸") && <span style={{color:phaseColor,flexShrink:0,marginTop:1}}>▸</span>}
          <span style={{fontSize:13,color:"#CCC",lineHeight:1.6}}>
            {parts.map((p,j)=>j%2===1?<strong key={j} style={{color:"#E2E4F0"}}>{p}</strong>:<span key={j}>{p.replace("▸ ","")}</span>)}
          </span>
        </div>;
      }
      if(line.startsWith("▸ ")) return <div key={i} style={{display:"flex",gap:8,padding:"4px 0",alignItems:"flex-start"}}><span style={{color:phaseColor,flexShrink:0,marginTop:1}}>▸</span><span style={{fontSize:13,color:"#CCC",lineHeight:1.6}}>{line.replace("▸ ","")}</span></div>;
      if(line.startsWith("# ")) return <div key={i} style={{fontFamily:"monospace",fontSize:12,color:"#00C9A7",background:"#0A1A10",padding:"3px 8px",borderRadius:4,margin:"2px 0"}}>{line}</div>;
      if(line.trim() === "") return <div key={i} style={{height:8}}/>;
      return <div key={i} style={{color:"#CCC",fontSize:13,lineHeight:1.7,padding:"2px 0"}}>{line}</div>;
    });
  }

  return (
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:C.card,width:"100%",maxWidth:700,maxHeight:"92vh",borderRadius:"20px 20px 0 0",display:"flex",flexDirection:"column",border:`1px solid ${C.border}`}}>
        
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:`linear-gradient(135deg,${phaseColor}18,${C.card})`}}>
          <div>
            <div style={{fontSize:10,color:phaseColor,fontWeight:700,textTransform:"uppercase",marginBottom:2,letterSpacing:"1px"}}>📚 COURS IA</div>
            <div style={{fontWeight:800,fontSize:16,color:"#E2E4F0"}}>{topic}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",color:"#fff",fontSize:18,width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        <div style={{display:"flex",padding:"0 20px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          {[
            {id:"cours",label:"📚 Cours"},
            {id:"exemple",label:"📌 Exemples"},
            {id:"exercice",label:"✏️ Exercices"},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:"12px 14px",border:"none",cursor:"pointer",background:"transparent",
              color:tab===t.id?phaseColor:"#666",fontWeight:tab===t.id?700:400,fontSize:12,
              borderBottom:`2px solid ${tab===t.id?phaseColor:"transparent"}`,
              transition:"all 0.15s",

        </div>

        <div style={{overflowY:"auto",padding:"20px",flex:1}}>
          {renderMd(content)}

        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,flexShrink:0}}>

            ✓ Compris, je continue !
          </button>
        </div>
      </div>

  );

// STORAGE
const SK = "trp_v4";

function getLevel(xp) {
  for(let i=LEVELS.length-1;i>=0;i--) if(xp>=LEVELS[i].min) return {level:i+1,...LEVELS[i]};
  return {level:1,...LEVELS[0]};
}
function getLevelPct(xp) {
  const l=getLevel(xp);
  return Math.round(((xp-l.min)/(l.max-l.min))*100);
}

function App() {
  const [tab,setTab] = useState("dashboard");
  const [progress,setProgress] = useState({});
  // xp, streak, badges, journal, pomodoros
  const [meta,setMeta] = useState({xp:0,streak:0,lastActive:"",totalPomodoros:0,badges:[],journalCount:0});
  const [activePhase,setActivePhase] = useState("p0");
  const [activeWeek,setActiveWeek] = useState("p0w1");
  const [quizState,setQuizState] = useState(null); // {phaseId,weekId,answers:[],done}
  const [journalOpen,setJournalOpen] = useState(false);
  const [journalEntry,setJournalEntry] = useState("");
  const [journalHistory,setJournalHistory] = useState([]);
  const [pomodoroActive,setPomodoroActive] = useState(false);
  const [pomodoroSeconds,setPomodoroSeconds] = useState(25*60);
  const [pomodoroPhase,setPomodoroPhase] = useState("work"); // work | break
  const [toast,setToast] = useState(null);
  const [planOpen,setPlanOpen] = useState(false);
  const [loaded,setLoaded] = useState(false);
  const [activeCourse,setActiveCourse] = useState(null);
  const timerRef = useRef(null);

  // ── LOAD ──
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(SK);
      if(raw){
        const d = JSON.parse(raw);
        if(d.progress){
          const p={};
          for(const[k,v] of Object.entries(d.progress)) p[k]={...v,topics:new Set(v.topics||[])};
          setProgress(p);
        }
        if(d.meta) setMeta(d.meta);
        if(d.journal) setJournalHistory(d.journal);
      }
    } catch(e){}
    setLoaded(true);
  },[]);

  // ── SAVE ──
  useEffect(()=>{
    if(!loaded) return;
    try {
      const sp={};
      for(const[k,v] of Object.entries(progress)) sp[k]={...v,topics:Array.from(v.topics||[])};
      localStorage.setItem(SK, JSON.stringify({progress:sp,meta,journal:journalHistory}));
    } catch(e){}
  },[progress,meta,journalHistory,loaded]);

  // ── POMODORO TIMER ──
  useEffect(()=>{
    if(pomodoroActive){
      timerRef.current = setInterval(()=>{
        setPomodoroSeconds(s=>{
          if(s<=1){
            clearInterval(timerRef.current);
            setPomodoroActive(false);
            if(pomodoroPhase==="work"){
              addXp(XP_POMODORO,"🍅 Pomodoro terminé !");
              setMeta(m=>{
                const newTotal=m.totalPomodoros+1;
                const nb=[...m.badges];
                if(newTotal>=10 && !nb.includes("pomodoro_10")){nb.push("pomodoro_10");showToast("Badge débloqué : Focus Master 🍅");}
                return {...m,totalPomodoros:newTotal,badges:nb};
              });
              setPomodoroPhase("break");
              return 5*60;
            } else {
              setPomodoroPhase("work");
              return 25*60;
            }
          }
          return s-1;
        });
      },1000);
    } else {
      clearInterval(timerRef.current);
    }
    return ()=>clearInterval(timerRef.current);
  },[pomodoroActive,pomodoroPhase]);

  function showToast(msg,type="success"){
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  }

  function addXp(amount,msg){
    setMeta(m=>{
      const newXp=m.xp+amount;
      const oldLevel=getLevel(m.xp).level;
      const newLevel=getLevel(newXp).level;
      if(newLevel>oldLevel) showToast(`⬆️ Niveau ${newLevel} : ${getLevel(newXp).name} ${getLevel(newXp).icon}`,"level");
      return {...m,xp:newXp};
    });
    showToast(msg);
  }

  function checkAndUpdateStreak(){
    const today=new Date().toISOString().slice(0,10);
    setMeta(m=>{
      if(m.lastActive===today) return m;
      const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
      const newStreak = m.lastActive===yesterday ? m.streak+1 : 1;
      const nb=[...m.badges];
      if(newStreak>=3 && !nb.includes("streak_3")){nb.push("streak_3");showToast("Badge : 3 jours de feu 🔥");}
      if(newStreak>=7 && !nb.includes("streak_7")){nb.push("streak_7");showToast("Badge : Semaine de fer ⚡");}
      if(newStreak>=30 && !nb.includes("streak_30")){nb.push("streak_30");showToast("Badge : Mois invaincu 🏆");}
      return {...m,streak:newStreak,lastActive:today,badges:nb};
    });
  }

  function toggleTopic(phaseId,weekId,topicIndex){
    checkAndUpdateStreak();
    const key=`${phaseId}__${weekId}`;
    setProgress(prev=>{
      const cur=prev[key]||{topics:new Set(),completed:false,quizPassed:false};
      const topics=new Set(cur.topics);
      const phase=PROGRAM.find(p=>p.id===phaseId);
      const week=phase.weeks.find(w=>w.id===weekId);
      if(topics.has(topicIndex)){
        topics.delete(topicIndex);
      } else {
        topics.add(topicIndex);
        if(!cur.topics.has(topicIndex)){
          addXp(XP_TOPIC,`+${XP_TOPIC} XP — sujet complété !`);
          setMeta(m=>{
            const nb=[...m.badges];
            const allTopics=Object.values({...prev,[key]:{topics,completed:false,quizPassed:false}}).reduce((a,v)=>a+v.topics.size,0);
            if(allTopics===1 && !nb.includes("first_topic")){nb.push("first_topic");showToast("Badge : Premier pas 🎯");}
            return {...m,badges:nb};
          });
        }
      }
      const completed=topics.size===week.topics.length;
      if(completed && !cur.completed){
        addXp(XP_WEEK,`+${XP_WEEK} XP — semaine terminée ! 🎉`);
        setMeta(m=>{
          const nb=[...m.badges];
          const doneWeeks=Object.values({...prev,[key]:{topics,completed:true,quizPassed:cur.quizPassed}}).filter(v=>v.completed).length;
          if(doneWeeks===1 && !nb.includes("first_week")){nb.push("first_week");showToast("Badge : Semaine 1 🏁");}
          // Check phase completion
          const phaseDoneKey=`${phaseId}_done`;
          if(!nb.includes(phaseDoneKey)){
            const phaseObj=PROGRAM.find(p=>p.id===phaseId);
            const allDone=phaseObj.weeks.every(w=>{
              const k=`${phaseId}__${w.id}`;
              const wp={...prev,[key]:{topics,completed:true,quizPassed:cur.quizPassed}}[k];
              return wp?.completed;
            });
            if(allDone){nb.push(phaseDoneKey);showToast(`Phase terminée : ${phaseObj.icon} ${phaseObj.title} !`,"level");}
          }
          return {...m,badges:nb};
        });
      }
      return {...prev,[key]:{topics,completed,quizPassed:cur.quizPassed}};
    });
  }

  function startQuiz(phaseId,weekId){
    checkAndUpdateStreak();
    setQuizState({phaseId,weekId,answers:[],done:false,score:0});
    setTab("quiz");
  }

  function answerQuiz(qIdx,aIdx){
    if(quizState.done) return;
    const phase=PROGRAM.find(p=>p.id===quizState.phaseId);
    const week=phase.weeks.find(w=>w.id===quizState.weekId);
    const q=week.quiz[qIdx];
    const correct=aIdx===q.a;
    const newAnswers=[...quizState.answers,{qIdx,aIdx,correct}];
    if(newAnswers.length===week.quiz.length){
      const score=newAnswers.filter(a=>a.correct).length;
      const perfect=score===week.quiz.length;
      const passed=score>=3;
      const xpEarned=perfect?XP_QUIZ_PERFECT:passed?XP_QUIZ_PASS:20;
      addXp(xpEarned,`Quiz : ${score}/${week.quiz.length} — +${xpEarned} XP`);
      const key=`${quizState.phaseId}__${quizState.weekId}`;
      setProgress(prev=>({...prev,[key]:{...(prev[key]||{topics:new Set(),completed:false}),quizPassed:passed}}));
      setMeta(m=>{
        const nb=[...m.badges];
        const totalQuizzes=Object.values(progress).filter(v=>v.quizPassed).length;
        if(totalQuizzes===0 && passed && !nb.includes("first_quiz")){nb.push("first_quiz");showToast("Badge : Premier Quiz 🧪");}
        if(perfect && !nb.includes("perfect_quiz")){nb.push("perfect_quiz");showToast("Badge : Génie 🌟");}
        return {...m,badges:nb};
      });
      setQuizState(s=>({...s,answers:newAnswers,done:true,score}));
    } else {
      setQuizState(s=>({...s,answers:newAnswers}));
    }
  }

  function saveJournal(){
    if(!journalEntry.trim()) return;
    checkAndUpdateStreak();
    const entry={date:new Date().toISOString(),text:journalEntry.trim()};
    const newHistory=[entry,...journalHistory];

      return {...m,journalCount:newHistory.length,badges:nb};

    setJournalEntry("");
  }

  // ── COMPUTED ──
  function getPhaseStats(phase){
    let total=0,done=0,weeks=0,weeksDone=0,quizzesPassed=0;
    phase.weeks.forEach(w=>{
      weeks++;
      total+=w.topics.length;
      const k=`${phase.id}__${w.id}`;
      const p=progress[k];
      done+=p?p.topics.size:0;
      if(p?.completed) weeksDone++;
      if(p?.quizPassed) quizzesPassed++;
    });
    return{total,done,pct:total?Math.round((done/total)*100):0,weeks,weeksDone,quizzesPassed};
  }

        const p=progress[k];
        if(p){td+=p.topics.size; if(p.completed)twd++;}
      });
    });
    return{tt,td,tw,twd,pct:tt?Math.round((td/tt)*100):0};

        {tab==="week"&&(
          <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
            {/* Phase + week list */}
            <div>
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {PROGRAM.map(p=>(
                  <button key={p.id} onClick={()=>{setActivePhase(p.id);setActiveWeek(p.weeks[0].id);}} style={{
                    width:34,height:34,borderRadius:8,border:`1px solid ${activePhase===p.id?p.color:C.border}`,cursor:"pointer",
                    background:activePhase===p.id?`${p.color}22`:"transparent",fontSize:16,
                  }}>{p.icon}</button>
                ))}
              </div>
              <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>
                  {phase?.icon} {phase?.title}
                </div>
                <div style={{maxHeight:520,overflowY:"auto"}}>
                  {phase?.weeks.map(w=>{
                    const k=`${activePhase}__${w.id}`;
                    const wp=progress[k];
                    const p=w.topics.length?Math.round(((wp?.topics.size||0)/w.topics.length)*100):0;
                    return(
                      <div key={w.id} onClick={()=>setActiveWeek(w.id)} style={{
                        padding:"10px 14px",cursor:"pointer",
                        background:activeWeek===w.id?`${phase?.color}18`:"transparent",
                        borderLeft:`3px solid ${activeWeek===w.id?phase?.color:"transparent"}`,
                        borderBottom:`1px solid ${C.border}`,
                      }}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                          <span style={{fontSize:10,color:phase?.color,fontWeight:700}}>Sem.{w.week}</span>
                          <div style={{display:"flex",gap:3}}>
                            {wp?.quizPassed&&<span style={{fontSize:11}}>🧪</span>}
                            {wp?.completed&&<span style={{color:"#00C9A7",fontSize:12}}>✓</span>}
                          </div>
                        </div>
                        <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>{w.title}</div>
                        <div style={{background:C.bg,borderRadius:99,height:3}}>
                          <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:phase?.color}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Week content */}
            <div>
              <div style={{background:`linear-gradient(135deg,${phase?.color}15,${C.card})`,border:`1px solid ${phase?.color}44`,borderRadius:12,padding:20,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:10,color:phase?.color,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Semaine {week?.week}</div>
                    <div style={{fontWeight:800,fontSize:20}}>{week?.title}</div>
                  </div>
                  <button onClick={()=>startQuiz(activePhase,week?.id)} style={{
                    padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",
                    background:weekProgress.quizPassed?"#F7C948":"#6C63FF",color:"#fff",fontWeight:700,fontSize:12,
                  }}>
                    {weekProgress.quizPassed?"✓ Quiz passé":"🧪 Faire le quiz"}
                  </button>
                </div>
                <div style={{background:C.border,borderRadius:99,height:7}}>
                  <div style={{height:"100%",borderRadius:99,width:`${week?.topics.length?Math.round((weekProgress.topics.size/week.topics.length)*100):0}%`,background:`linear-gradient(90deg,${phase?.color},${phase?.accent})`,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:6}}>{weekProgress.topics.size}/{week?.topics.length} sujets · {weekProgress.quizPassed?"Quiz ✓":"Quiz non passé"}</div>
              </div>

              {/* Topics */}
              <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,marginBottom:12}}>
                <div style={{fontWeight:700,marginBottom:12}}>📚 Sujets à maîtriser</div>
                {week?.topics.map((t,i)=>{
                  const checked=weekProgress.topics.has(i);
                  return(
                    <div key={i} style={{
                      display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,marginBottom:5,
                      background:checked?`${phase?.color}15`:C.bg,border:`1px solid ${checked?phase?.color+"44":C.border}`,
                    }}>
                      <div onClick={()=>toggleTopic(activePhase,week.id,i)} style={{width:20,height:20,borderRadius:5,flexShrink:0,background:checked?phase?.color:"transparent",border:`2px solid ${checked?phase?.color:"#444"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",cursor:"pointer"}}>
                        {checked?"✓":""}
                      </div>
                      <span onClick={()=>toggleTopic(activePhase,week.id,i)} style={{fontSize:13,color:checked?C.text:"#AAA",flex:1,cursor:"pointer"}}>{t}</span>
                      <button onClick={()=>setActiveCourse(t)} style={{background:`${phase?.color}22`,border:`1px solid ${phase?.color}44`,borderRadius:6,padding:"3px 8px",cursor:"pointer",color:phase?.color,fontSize:11,fontWeight:700,flexShrink:0}}>
                        📚 Cours
                      </button>
                    </div>
                  );
                })}
              </div>

              {/* Project */}
              {week?.project&&(
                <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${phase?.color}44`,marginBottom:12}}>
                  <div style={{fontWeight:700,marginBottom:8,color:phase?.accent}}>🛠 Projet de la semaine</div>
                  <div style={{fontSize:13,color:"#CCC",lineHeight:1.6}}>{week.project}</div>
                </div>
              )}

              {/* Resources */}
              {week?.resources?.length>0&&(
                <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,marginBottom:10}}>📖 Ressources</div>
                  {week.resources.map((r,i)=>(
                    <div key={i} style={{padding:"7px 10px",background:C.bg,borderRadius:7,marginBottom:5,fontSize:12,color:"#AAA"}}>📌 {r}</div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── QUIZ ── */}
        {tab==="quiz"&&(()=>{
          if(!quizState){
            // Show quiz selector
            return(
              <div>
                <div style={{fontWeight:800,fontSize:20,marginBottom:20}}>🧪 Quiz par semaine</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                  {PROGRAM.flatMap(p=>p.weeks.map(w=>({...w,phaseId:p.id,phaseColor:p.color,phaseIcon:p.icon,phaseTitle:p.title}))).map(w=>{
                    const k=`${w.phaseId}__${w.id}`;
                    const wp=progress[k];
                    return(
                      <div key={w.id} style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${wp?.quizPassed?"#F7C948":C.border}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span style={{fontSize:10,color:w.phaseColor,fontWeight:700}}>{w.phaseIcon} Ph.{PROGRAM.findIndex(p=>p.id===w.phaseId)} · Sem.{w.week}</span>
                          {wp?.quizPassed&&<span style={{color:"#F7C948"}}>🧪✓</span>}
                        </div>
                        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>{w.title}</div>
                        <button onClick={()=>startQuiz(w.phaseId,w.id)} style={{
                          width:"100%",padding:"7px",borderRadius:7,border:"none",cursor:"pointer",
                          background:wp?.quizPassed?"rgba(247,201,72,0.15)":"rgba(108,99,255,0.2)",
                          color:wp?.quizPassed?"#F7C948":"#A89CFF",fontWeight:600,fontSize:12,

                          {wp?.quizPassed?"Refaire le quiz":"Commencer le quiz"}
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }

          const qPhase=PROGRAM.find(p=>p.id===quizState.phaseId);
          const qWeek=qPhase.weeks.find(w=>w.id===quizState.weekId);
          const currentQ=quizState.answers.length;

          if(quizState.done){
            const perfect=quizState.score===qWeek.quiz.length;
            return(
              <div style={{maxWidth:600,margin:"0 auto",textAlign:"center"}}>
                <div style={{fontSize:60,marginBottom:16}}>{perfect?"🌟":quizState.score>=3?"✅":"💪"}</div>
                <div style={{fontWeight:800,fontSize:28,marginBottom:8}}>
                  {quizState.score}/{qWeek.quiz.length} bonnes réponses
                </div>
                <div style={{color:C.muted,fontSize:15,marginBottom:24}}>
                  {perfect?"Parfait ! Tu maîtrises ce sujet.":quizState.score>=3?"Bonne progression !":"Continue à étudier et réessaie."}
                </div>
                {/* Review */}
                <div style={{textAlign:"left",marginBottom:24}}>
                  {qWeek.quiz.map((q,i)=>{
                    const ans=quizState.answers[i];
                    return(
                      <div key={i} style={{background:C.card,borderRadius:10,padding:14,marginBottom:10,border:`1px solid ${ans?.correct?"#00C9A7":"#FF6B6B"}33`}}>
                        <div style={{fontWeight:600,marginBottom:8,fontSize:13}}>{i+1}. {q.q}</div>
                        {q.choices.map((c,ci)=>(
                          <div key={ci} style={{padding:"6px 10px",borderRadius:6,marginBottom:4,fontSize:12,
                            background:ci===q.a?"rgba(0,201,167,0.15)":ci===ans?.aIdx&&!ans?.correct?"rgba(255,107,107,0.15)":"transparent",
                            color:ci===q.a?"#00C9A7":ci===ans?.aIdx&&!ans?.correct?"#FF6B6B":C.muted,

                            {ci===q.a?"✓ ":ci===ans?.aIdx&&!ans?.correct?"✗ ":""}{c}

                </div>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={()=>setQuizState(null)} style={{padding:"10px 20px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700}}>
                    Tous les quiz
                  </button>
                  <button onClick={()=>startQuiz(quizState.phaseId,quizState.weekId)} style={{padding:"10px 20px",borderRadius:8,border:`1px solid ${C.border}`,cursor:"pointer",background:"transparent",color:C.muted,fontWeight:700}}>
                    Réessayer
                  </button>
                </div>
              </div>
            );
          }

          const q=qWeek.quiz[currentQ];
          return(
            <div style={{maxWidth:600,margin:"0 auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={()=>setQuizState(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.muted,fontSize:13}}>← Retour</button>
                <span style={{color:C.muted,fontSize:13}}>{qPhase.icon} {qWeek.title}</span>
                <span style={{color:"#6C63FF",fontWeight:700,fontSize:13}}>{currentQ+1}/{qWeek.quiz.length}</span>
              </div>
              <div style={{background:C.border,borderRadius:99,height:6,marginBottom:24}}>
                <div style={{height:"100%",borderRadius:99,width:`${(currentQ/qWeek.quiz.length)*100}%`,background:qPhase.color,transition:"width 0.3s"}}/>
              </div>
              <div style={{background:C.card,borderRadius:14,padding:24,border:`1px solid ${C.border}`,marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{q.q}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {q.choices.map((c,ci)=>(
                  <button key={ci} onClick={()=>answerQuiz(currentQ,ci)} style={{
                    padding:"14px 18px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",
                    background:C.card,color:C.text,fontWeight:600,fontSize:14,textAlign:"left",
                    transition:"all 0.15s",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=qPhase.color}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                    <span style={{color:C.muted,marginRight:10}}>{["A","B","C","D"][ci]}.</span>{c}
                  </button>
                ))}
              </div>
            </div>
          );
        })()}

        {/* ── JOURNAL ── */}
        {tab==="journal"&&(
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <div style={{fontWeight:800,fontSize:20,marginBottom:20}}>📖 Journal d'apprentissage</div>
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:10}}>Nouvelle entrée — <span style={{color:C.muted,fontWeight:400,fontSize:12}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</span></div>
              <textarea
                value={journalEntry}
                onChange={e=>setJournalEntry(e.target.value)}
                placeholder="Qu'as-tu appris aujourd'hui ? Quelles difficultés as-tu rencontrées ? Qu'est-ce qui t'a surpris ?"
                style={{width:"100%",minHeight:120,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:12,color:C.text,fontSize:13,resize:"vertical",lineHeight:1.6,boxSizing:"border-box",outline:"none"}}
              />
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
                <span style={{fontSize:11,color:C.muted}}>+{XP_JOURNAL} XP par entrée · {journalHistory.length} entrées au total</span>
                <button onClick={saveJournal} style={{padding:"8px 18px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700,fontSize:13}}>
                  Sauvegarder
                </button>
              </div>
            </div>
            {journalHistory.length===0?(
              <div style={{textAlign:"center",color:C.muted,padding:40}}>Aucune entrée. Commence à écrire !</div>
            ):(
              journalHistory.map((e,i)=>(
                <div key={i} style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,marginBottom:12}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{new Date(e.date).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"})}</div>
                  <div style={{fontSize:13,lineHeight:1.7,color:"#CCC",whiteSpace:"pre-wrap"}}>{e.text}</div>
                </div>

          </div>
        )}

        {/* ── BADGES ── */}
        {tab==="badges"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:20}}>🏆 Badges & Récompenses</div>
              <div style={{color:C.muted,fontSize:13}}>{meta.badges.length}/{BADGES.length} débloqués</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
              {BADGES.map(b=>{
                const unlocked=meta.badges.includes(b.id);
                return(
                  <div key={b.id} style={{background:C.card,borderRadius:12,padding:18,textAlign:"center",border:`1px solid ${unlocked?"#F7C948":"#1A1D2E"}`,opacity:unlocked?1:0.45}}>
                    <div style={{fontSize:36,marginBottom:8,filter:unlocked?"none":"grayscale(1)"}}>{b.icon}</div>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:unlocked?"#F7C948":C.muted}}>{b.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{b.desc}</div>
                    {unlocked&&<div style={{marginTop:8,fontSize:10,color:"#F7C948"}}>✓ Débloqué</div>}

            {/* Levels */}

            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
              {LEVELS.map((l,i)=>{
                const current=getLevel(meta.xp).level===i+1;
                const done=meta.xp>=l.min;
                return(
                  <div key={i} style={{background:C.card,borderRadius:10,padding:14,textAlign:"center",border:`1px solid ${current?"#6C63FF":done?"#6C63FF33":C.border}`}}>
                    <div style={{fontSize:28,marginBottom:6}}>{l.icon}</div>
                    <div style={{fontWeight:700,fontSize:12,color:current?"#A89CFF":done?"#6C63FF66":C.muted}}>Lv.{i+1}</div>
                    <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>{l.name}</div>
                    <div style={{fontSize:10,color:C.muted}}>{l.min.toLocaleString()} XP</div>
                    {current&&<div style={{marginTop:6,fontSize:10,color:"#A89CFF",fontWeight:700}}>← Tu es ici</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── PLANNING ── */}
        {tab==="plan"&&(
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <div style={{fontWeight:800,fontSize:20,marginBottom:6}}>🗓 Planning hebdomadaire</div>
            <div style={{color:C.muted,fontSize:13,marginBottom:20}}>Basé sur ton avancement actuel · 3–4h/jour recommandées</div>

            {/* Daily schedule */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:16}}>📅 Répartition quotidienne type</div>
              {[
                {time:"07:00–08:00",task:"📚 Théorie : lire, regarder des vidéos, prendre des notes",color:"#6C63FF"},
                {time:"08:00–09:30",task:"💻 Pratique : coder, résoudre des exercices",color:"#00C9A7"},
                {time:"09:30–10:15",task:"🛠 Projet personnel en cours",color:"#FF6B6B"},
                {time:"10:15–10:30",task:"🗞 Veille tech : Hacker News, Twitter, arXiv",color:"#F7C948"},
              ].map((s,i)=>(
                <div key={i} style={{display:"flex",gap:14,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,fontSize:12,color:s.color,flexShrink:0,width:120}}>{s.time}</div>
                  <div style={{fontSize:13,color:"#CCC"}}>{s.task}</div>

              ))}
            </div>

            {/* This week plan */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:16}}>🗓 Plan de la semaine à venir</div>
              {getWeeklyPlan().map((d,i)=>(
                <div key={i} style={{display:"flex",gap:14,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,fontSize:12,color:"#A89CFF",flexShrink:0,width:80}}>{d.day}</div>
                  <div style={{fontSize:13,color:"#CCC"}}>{d.task}</div>
                </div>
              ))}
            </div>

            {/* Anti-procrastination rules */}
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1px solid #FF6B6B44`}}>
              <div style={{fontWeight:700,marginBottom:14,color:"#FF6B6B"}}>⚠️ Règles anti-triche & anti-abandon</div>
              {[
                "Ne coche un sujet ✓ que si tu peux l'expliquer à voix haute à quelqu'un.",
                "Ne passe pas à la semaine suivante sans avoir fait le projet pratique.",
                "Ne passe pas à la semaine suivante sans avoir réussi le quiz (≥ 3/4).",
                "Si tu sautes un jour, pas de panique : reprends le lendemain, pas de double charge.",
                "Si tu bloques plus de 30 min sur un sujet, cherche une autre ressource. Ne reste pas bloqué.",
                "Commit du code sur GitHub chaque jour où tu codes. Pas de commit = pas de session.",
                "Partage ton avancement avec quelqu'un une fois par semaine (ami, forum, Discord).",
              ].map((r,i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:"#FF6B6B",fontWeight:700,flexShrink:0}}>{i+1}.</span>
                  <span style={{fontSize:13,color:"#CCC",lineHeight:1.5}}>{r}</span>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* COURSE MODAL */}
      {activeCourse && (
        <CourseModal
          topic={activeCourse}
          phaseColor={phase?.color||"#6C63FF"}
          onClose={()=>setActiveCourse(null)}
        />
      )}

      <style>{`
        @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:#0F1118} ::-webkit-scrollbar-thumb{background:#2A2D40;border-radius:3px}
        button:hover{filter:brightness(1.1)}
        textarea:focus{border-color:#6C63FF !important}
      `}</style>
    </div>
  );
}

// DUOLINGO FEATURES
// ─────────────────────────────────────────────
const MAX_HEARTS = 5;
const DAILY_GOALS = [5, 10, 15, 20]; // minutes
const LEAGUES = [
  {name:"Bronze", icon:"🥉", color:"#CD7F32", min:0},
  {name:"Argent", icon:"🥈", color:"#C0C0C0", min:200},
  {name:"Or", icon:"🥇", color:"#FFD700", min:500},
  {name:"Diamant", icon:"💎", color:"#4FACFE", min:1000},
];

function getLeague(xp) {
  for(let i=LEAGUES.length-1;i>=0;i--) if(xp>=LEAGUES[i].min) return LEAGUES[i];
  return LEAGUES[0];
}

// Mascot messages
const MASCOT_HAPPY = ["🦉 Excellent ! Continue comme ça !", "🦉 Tu es en feu !", "🦉 Bravo, champion !", "🦉 Tu progresses vite !", "🦉 Impressionnant !"];
const MASCOT_SAD = ["🦉 Hé ! Tu m'as oublié ?", "🦉 Ton streak est en danger !", "🦉 Reviens, je m'ennuie !", "🦉 On a un programme à finir !", "🦉 Les milliardaires ne procrastinent pas !"];

function getMascotMsg(streak) {
  if(streak > 0) return MASCOT_HAPPY[Math.floor(Math.random()*MASCOT_HAPPY.length)];
  return MASCOT_SAD[Math.floor(Math.random()*MASCOT_SAD.length)];
}

// Confetti animation component
function Confetti({active}) {
  if(!active) return null;
  const colors = ["#6C63FF","#00C9A7","#F7C948","#FF6B6B","#4FACFE","#F77F00"];
  return (
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:9998,overflow:"hidden"}}>
      {Array.from({length:40}).map((_,i)=>(
        <div key={i} style={{
          position:"absolute",
          left:`${Math.random()*100}%`,
          top:"-10px",
          width:8,height:8,
          borderRadius:Math.random()>0.5?"50%":"0",
          background:colors[Math.floor(Math.random()*colors.length)],
          animation:`fall ${1+Math.random()*2}s linear ${Math.random()*0.5}s forwards`,
          transform:`rotate(${Math.random()*360}deg)`,
        }}/>
      ))}
      <style>{`
        @keyframes fall {
          to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

// Hearts component
function Hearts({count, max=5}) {
  return (
    <div style={{display:"flex",gap:3,alignItems:"center"}}>
      {Array.from({length:max}).map((_,i)=>(
        <span key={i} style={{fontSize:16,opacity:i<count?1:0.2}}>❤️</span>
      ))}
    </div>
  );
}

// Daily Goal Ring
function GoalRing({current, goal, color="#6C63FF"}) {
  const pct = Math.min(100, Math.round((current/goal)*100));
  const r = 28, circ = 2*Math.PI*r;
  return (
    <div style={{position:"relative",width:72,height:72,flexShrink:0}}>
      <svg width="72" height="72" style={{transform:"rotate(-90deg)"}}>
        <circle cx="36" cy="36" r={r} fill="none" stroke="#1A1D2E" strokeWidth="6"/>
        <circle cx="36" cy="36" r={r} fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
          strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
      </svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:900,color}}>{pct}%</div>
      </div>
    </div>
  );
}


// ─────────────────────────────────────────────
// DUOLINGO WRAPPER — wraps the original App with new features
// ─────────────────────────────────────────────
function DuoApp() {
  const SK2 = "trp_duo_v1";
  const [hearts, setHearts] = useState(MAX_HEARTS);
  const [lastHeartRegen, setLastHeartRegen] = useState("");
  const [dailyGoal, setDailyGoal] = useState(10); // minutes
  const [dailyMinutes, setDailyMinutes] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [mascotMsg, setMascotMsg] = useState("🦉 Bienvenue ! Commence ta formation !");
  const [showLeague, setShowLeague] = useState(false);
  const [xp, setXp] = useState(0); // synced from inner app
  const [duoLoaded, setDuoLoaded] = useState(false);
  const [showGoalPicker, setShowGoalPicker] = useState(false);
  const [weeklyXP, setWeeklyXP] = useState([0,0,0,0,0,0,0]); // XP per day this week
  const [missedDays, setMissedDays] = useState(0);

  // Load duo state
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(SK2);
      if(raw){
        const d = JSON.parse(raw);
        if(d.hearts !== undefined) setHearts(d.hearts);
        if(d.lastHeartRegen) setLastHeartRegen(d.lastHeartRegen);
        if(d.dailyGoal) setDailyGoal(d.dailyGoal);
        if(d.dailyMinutes !== undefined) setDailyMinutes(d.dailyMinutes);
        if(d.weeklyXP) setWeeklyXP(d.weeklyXP);
        if(d.missedDays !== undefined) setMissedDays(d.missedDays);
      }
      // Read xp from main storage
      const main = localStorage.getItem("trp_v4");
      if(main){
        const m = JSON.parse(main);
        if(m.meta?.xp) setXp(m.meta.xp);
      }
    } catch(e){}
    setDuoLoaded(true);
  },[]);

  // Save duo state
  useEffect(()=>{
    if(!duoLoaded) return;
    try {
      localStorage.setItem(SK2, JSON.stringify({hearts,lastHeartRegen,dailyGoal,dailyMinutes,weeklyXP,missedDays}));
    } catch(e){}
  },[hearts,lastHeartRegen,dailyGoal,dailyMinutes,weeklyXP,missedDays,duoLoaded]);

  // Regenerate hearts every 30 min (simulated)
  useEffect(()=>{
    const now = new Date().toISOString().slice(0,16); // minute precision
    if(hearts < MAX_HEARTS && lastHeartRegen !== now){
      const last = new Date(lastHeartRegen || 0);
      const diff = (Date.now() - last.getTime()) / 60000; // minutes
      const regen = Math.floor(diff / 30);
      if(regen > 0){
        setHearts(h => Math.min(MAX_HEARTS, h + regen));
        setLastHeartRegen(now);
      }
    }
  },[]);

  // Sync XP from main storage periodically
  useEffect(()=>{
    const interval = setInterval(()=>{
      try {
        const main = localStorage.getItem("trp_v4");
        if(main){
          const m = JSON.parse(main);
          if(m.meta?.xp !== undefined) setXp(m.meta.xp);
        }
      } catch(e){}
    }, 2000);
    return ()=>clearInterval(interval);
  },[]);

  function loseHeart(){
    setHearts(h=>{
      const nh = Math.max(0, h-1);
      if(nh === 0) setMascotMsg("🦉 Plus de vies ! Attends 30 min ou révise tes notes.");
      else setMascotMsg(`🦉 Oups ! Il te reste ${nh} vie${nh>1?"s":""}.`);
      return nh;
    });
  }

  function celebrate(){
    setShowConfetti(true);
    setMascotMsg(MASCOT_HAPPY[Math.floor(Math.random()*MASCOT_HAPPY.length)]);
    setTimeout(()=>setShowConfetti(false), 3000);
  }

  // Track daily minutes (increment every minute when page is open)
  useEffect(()=>{
    const today = new Date().toISOString().slice(0,10);
    const lastDay = localStorage.getItem("trp_last_day");
    if(lastDay !== today){
      localStorage.setItem("trp_last_day", today);
      setDailyMinutes(0);
      // Update weekly XP
      const dayOfWeek = new Date().getDay();
      try {
        const main = localStorage.getItem("trp_v4");
        if(main){
          const m = JSON.parse(main);
          setWeeklyXP(prev=>{
            const nw=[...prev];
            nw[dayOfWeek]=m.meta?.xp||0;
            return nw;
          });
        }
      } catch(e){}
    }
    const interval = setInterval(()=>{
      setDailyMinutes(m=>{
        const nm=m+1;
        if(nm === dailyGoal) {
          celebrate();
          setMascotMsg("🦉 Objectif du jour atteint ! Champion !");
        }
        return nm;
      });
    }, 60000);
    return ()=>clearInterval(interval);
  },[dailyGoal]);

  const league = getLeague(xp);
  const goalPct = Math.min(100, Math.round((dailyMinutes/dailyGoal)*100));
  const C = { bg:"#07080D", card:"#0F1118", border:"#1A1D2E", text:"#E2E4F0", muted:"#5A5F7A" };

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Confetti active={showConfetti}/>

      {/* DUOLINGO TOP BAR */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:56,zIndex:150}}>
        {/* Hearts */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Hearts count={hearts}/>
          {hearts < MAX_HEARTS && (
            <span style={{fontSize:11,color:"#888"}}>+1 dans 30min</span>
          )}
        </div>

        {/* Daily goal ring */}
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setShowGoalPicker(p=>!p)}>
          <GoalRing current={dailyMinutes} goal={dailyGoal} color="#F7C948"/>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#F7C948"}}>Objectif du jour</div>
            <div style={{fontSize:10,color:"#888"}}>{dailyMinutes}/{dailyGoal} min</div>
          </div>
        </div>

        {/* League */}
        <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>setShowLeague(p=>!p)}>
          <span style={{fontSize:20}}>{league.icon}</span>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:league.color}}>Ligue {league.name}</div>
            <div style={{fontSize:10,color:"#888"}}>{xp.toLocaleString()} XP</div>
          </div>
        </div>
      </div>

      {/* GOAL PICKER */}
      {showGoalPicker && (
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,zIndex:500,width:300}}>
          <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>🎯 Objectif quotidien</div>
          <div style={{color:"#888",fontSize:13,marginBottom:20}}>Combien de minutes par jour ?</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {DAILY_GOALS.map(g=>(
              <button key={g} onClick={()=>{setDailyGoal(g);setShowGoalPicker(false);}} style={{
                padding:"14px",borderRadius:10,border:`2px solid ${dailyGoal===g?"#6C63FF":C.border}`,cursor:"pointer",
                background:dailyGoal===g?"rgba(108,99,255,0.2)":C.bg,color:dailyGoal===g?"#A89CFF":C.text,fontWeight:700,fontSize:15,
              }}>
                {g} min
                <div style={{fontSize:10,color:"#888",fontWeight:400,marginTop:2}}>
                  {g<=5?"Décontracté":g<=10?"Normal":g<=15?"Intensif":"Hardcore"}
                </div>
              </button>
            ))}
          </div>
          <button onClick={()=>setShowGoalPicker(false)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700}}>
            Fermer
          </button>
        </div>
      )}

      {/* LEAGUE MODAL */}
      {showLeague && (
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,zIndex:500,width:320}}>
          <div style={{fontWeight:800,fontSize:18,marginBottom:16,textAlign:"center"}}>🏆 Ligues</div>
          {LEAGUES.map((l,i)=>{
            const isCurrentLeague = league.name===l.name;
            const nextLeague = LEAGUES[i+1];
            return(
              <div key={l.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:10,marginBottom:8,background:isCurrentLeague?`${l.color}18`:C.bg,border:`1px solid ${isCurrentLeague?l.color:C.border}`}}>
                <span style={{fontSize:28}}>{l.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,color:l.color}}>{l.name}</div>
                  <div style={{fontSize:11,color:"#888"}}>{l.min.toLocaleString()} XP requis</div>
                  {isCurrentLeague && nextLeague && (
                    <div style={{marginTop:4}}>
                      <div style={{background:C.border,borderRadius:99,height:4}}>
                        <div style={{height:"100%",borderRadius:99,width:`${Math.min(100,Math.round(((xp-l.min)/(nextLeague.min-l.min))*100))}%`,background:l.color}}/>
                      </div>
                      <div style={{fontSize:10,color:"#888",marginTop:2}}>{xp-l.min}/{nextLeague.min-l.min} XP pour {nextLeague.name}</div>
                    </div>
                  )}
                </div>
                {isCurrentLeague && <span style={{color:l.color,fontSize:14}}>←</span>}
              </div>
            );
          })}
          <button onClick={()=>setShowLeague(false)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700,marginTop:8}}>
            Fermer
          </button>
        </div>
      )}

      {/* MASCOT BAR */}
      <div style={{background:`linear-gradient(135deg,rgba(108,99,255,0.1),rgba(79,172,254,0.05))`,borderBottom:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>🦉</span>
        <span style={{fontSize:13,color:"#CCC",fontStyle:"italic"}}>{mascotMsg}</span>
      </div>

      {/* WEEKLY XP CHART */}
      <div style={{background:C.card,margin:"12px 16px",borderRadius:12,padding:"14px 16px",border:`1px solid ${C.border}`}}>
        <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>📈 XP cette semaine</div>
        <div style={{display:"flex",gap:6,alignItems:"flex-end",height:50}}>
          {["D","L","M","M","J","V","S"].map((d,i)=>{
            const val = weeklyXP[i]||0;
            const max = Math.max(...weeklyXP, 1);
            const h = Math.max(4, Math.round((val/max)*44));
            const today = new Date().getDay();
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:"100%",height:h,borderRadius:4,background:i===today?"#6C63FF":"#1A1D2E",transition:"height 0.3s"}}/>
                <span style={{fontSize:9,color:i===today?"#A89CFF":"#555",fontWeight:i===today?700:400}}>{d}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* The original App */}
      <App/>
    </div>
  );
}

root.render(<DuoApp/>);
