// DUOLINGO FEATURES
// ─────────────────────────────────────────────
const MAX_HEARTS = 5;
const DAILY_GOALS = [5, 10, 15, 20]; // minutes
const LEAGUES = [
  {name:"Bronze", icon:"🥉", color:"#CD7F32", min:0},
  {name:"Argent", icon:"🥈", color:"#C0C0C0", min:200},
  {name:"Or", icon:"🥇", color:"#FFD700", min:500},
  {name:"Diamant", icon:"💎", color:"#4FACFE", min:1000},
];

function getLeague(xp) {
  for(let i=LEAGUES.length-1;i>=0;i--) if(xp>=LEAGUES[i].min) return LEAGUES[i];
  return LEAGUES[0];
}

// Mascot messages
const MASCOT_HAPPY = ["🦉 Excellent ! Continue comme ça !", "🦉 Tu es en feu !", "🦉 Bravo, champion !", "🦉 Tu progresses vite !", "🦉 Impressionnant !"];
const MASCOT_SAD = ["🦉 Hé ! Tu m'as oublié ?", "🦉 Ton streak est en danger !", "🦉 Reviens, je m'ennuie !", "🦉 On a un programme à finir !", "🦉 Les milliardaires ne procrastinent pas !"];

function getMascotMsg(streak) {
  if(streak > 0) return MASCOT_HAPPY[Math.floor(Math.random()*MASCOT_HAPPY.length)];
  return MASCOT_SAD[Math.floor(Math.random()*MASCOT_SAD.length)];
}

// Confetti animation component
function Confetti({active}) {
  if(!active) return null;
  const colors = ["#6C63FF","#00C9A7","#F7C948","#FF6B6B","#4FACFE","#F77F00"];
  return (
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:9998,overflow:"hidden"}}>
      {Array.from({length:40}).map((_,i)=>(
        <div key={i} style={{
          position:"absolute",
          left:`${Math.random()*100}%`,
          top:"-10px",
          width:8,height:8,
          borderRadius:Math.random()>0.5?"50%":"0",
          background:colors[Math.floor(Math.random()*colors.length)],
          animation:`fall ${1+Math.random()*2}s linear ${Math.random()*0.5}s forwards`,
          transform:`rotate(${Math.random()*360}deg)`,
        }}/>
      ))}
      <style>{`
        @keyframes fall {
          to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

// Hearts component
function Hearts({count, max=5}) {
  return (
    <div style={{display:"flex",gap:3,alignItems:"center"}}>
      {Array.from({length:max}).map((_,i)=>(
        <span key={i} style={{fontSize:16,opacity:i<count?1:0.2}}>❤️</span>
      ))}
    </div>
  );
}

// Daily Goal Ring
function GoalRing({current, goal, color="#6C63FF"}) {
  const pct = Math.min(100, Math.round((current/goal)*100));
  const r = 28, circ = 2*Math.PI*r;
  return (
    <div style={{position:"relative",width:72,height:72,flexShrink:0}}>
      <svg width="72" height="72" style={{transform:"rotate(-90deg)"}}>
        <circle cx="36" cy="36" r={r} fill="none" stroke="#1A1D2E" strokeWidth="6"/>
        <circle cx="36" cy="36" r={r} fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
          strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
      </svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:900,color}}>{pct}%</div>
      </div>
    </div>
  );
}


// ─────────────────────────────────────────────
// DUOLINGO WRAPPER — wraps the original App with new features
// ─────────────────────────────────────────────
function DuoApp() {
  const SK2 = "trp_duo_v1";
  const [hearts, setHearts] = useState(MAX_HEARTS);
  const [lastHeartRegen, setLastHeartRegen] = useState("");
  const [dailyGoal, setDailyGoal] = useState(10); // minutes
  const [dailyMinutes, setDailyMinutes] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [mascotMsg, setMascotMsg] = useState("🦉 Bienvenue ! Commence ta formation !");
  const [showLeague, setShowLeague] = useState(false);
  const [xp, setXp] = useState(0); // synced from inner app
  const [duoLoaded, setDuoLoaded] = useState(false);
  const [showGoalPicker, setShowGoalPicker] = useState(false);
  const [weeklyXP, setWeeklyXP] = useState([0,0,0,0,0,0,0]); // XP per day this week
  const [missedDays, setMissedDays] = useState(0);

  // Load duo state
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(SK2);
      if(raw){
        const d = JSON.parse(raw);
        if(d.hearts !== undefined) setHearts(d.hearts);
        if(d.lastHeartRegen) setLastHeartRegen(d.lastHeartRegen);
        if(d.dailyGoal) setDailyGoal(d.dailyGoal);
        if(d.dailyMinutes !== undefined) setDailyMinutes(d.dailyMinutes);
        if(d.weeklyXP) setWeeklyXP(d.weeklyXP);
        if(d.missedDays !== undefined) setMissedDays(d.missedDays);
      }
      // Read xp from main storage
      const main = localStorage.getItem("trp_v4");
      if(main){
        const m = JSON.parse(main);
        if(m.meta?.xp) setXp(m.meta.xp);
      }
    } catch(e){}
    setDuoLoaded(true);
  },[]);

  // Save duo state
  useEffect(()=>{
    if(!duoLoaded) return;
    try {
      localStorage.setItem(SK2, JSON.stringify({hearts,lastHeartRegen,dailyGoal,dailyMinutes,weeklyXP,missedDays}));
    } catch(e){}
  },[hearts,lastHeartRegen,dailyGoal,dailyMinutes,weeklyXP,missedDays,duoLoaded]);

  // Regenerate hearts every 30 min (simulated)
  useEffect(()=>{
    const now = new Date().toISOString().slice(0,16); // minute precision
    if(hearts < MAX_HEARTS && lastHeartRegen !== now){
      const last = new Date(lastHeartRegen || 0);
      const diff = (Date.now() - last.getTime()) / 60000; // minutes
      const regen = Math.floor(diff / 30);
      if(regen > 0){
        setHearts(h => Math.min(MAX_HEARTS, h + regen));
        setLastHeartRegen(now);
      }
    }
  },[]);

  // Sync XP from main storage periodically
  useEffect(()=>{
    const interval = setInterval(()=>{
      try {
        const main = localStorage.getItem("trp_v4");
        if(main){
          const m = JSON.parse(main);
          if(m.meta?.xp !== undefined) setXp(m.meta.xp);
        }
      } catch(e){}
    }, 2000);
    return ()=>clearInterval(interval);
  },[]);

  function loseHeart(){
    setHearts(h=>{
      const nh = Math.max(0, h-1);
      if(nh === 0) setMascotMsg("🦉 Plus de vies ! Attends 30 min ou révise tes notes.");
      else setMascotMsg(`🦉 Oups ! Il te reste ${nh} vie${nh>1?"s":""}.`);
      return nh;
    });
  }

  function celebrate(){
    setShowConfetti(true);
    setMascotMsg(MASCOT_HAPPY[Math.floor(Math.random()*MASCOT_HAPPY.length)]);
    setTimeout(()=>setShowConfetti(false), 3000);
  }

  // Track daily minutes (increment every minute when page is open)
  useEffect(()=>{
    const today = new Date().toISOString().slice(0,10);
    const lastDay = localStorage.getItem("trp_last_day");
    if(lastDay !== today){
      localStorage.setItem("trp_last_day", today);
      setDailyMinutes(0);
      // Update weekly XP
      const dayOfWeek = new Date().getDay();
      try {
        const main = localStorage.getItem("trp_v4");
        if(main){
          const m = JSON.parse(main);
          setWeeklyXP(prev=>{
            const nw=[...prev];
            nw[dayOfWeek]=m.meta?.xp||0;
            return nw;
          });
        }
      } catch(e){}
    }
    const interval = setInterval(()=>{
      setDailyMinutes(m=>{
        const nm=m+1;
        if(nm === dailyGoal) {
          celebrate();
          setMascotMsg("🦉 Objectif du jour atteint ! Champion !");
        }
        return nm;
      });
    }, 60000);
    return ()=>clearInterval(interval);
  },[dailyGoal]);

  const league = getLeague(xp);
  const goalPct = Math.min(100, Math.round((dailyMinutes/dailyGoal)*100));
  const C = { bg:"#07080D", card:"#0F1118", border:"#1A1D2E", text:"#E2E4F0", muted:"#5A5F7A" };

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Confetti active={showConfetti}/>

      {/* DUOLINGO TOP BAR */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:56,zIndex:150}}>
        {/* Hearts */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Hearts count={hearts}/>
          {hearts < MAX_HEARTS && (
            <span style={{fontSize:11,color:"#888"}}>+1 dans 30min</span>
          )}
        </div>

        {/* Daily goal ring */}
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setShowGoalPicker(p=>!p)}>
          <GoalRing current={dailyMinutes} goal={dailyGoal} color="#F7C948"/>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#F7C948"}}>Objectif du jour</div>
            <div style={{fontSize:10,color:"#888"}}>{dailyMinutes}/{dailyGoal} min</div>
          </div>
        </div>

        {/* League */}
        <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>setShowLeague(p=>!p)}>
          <span style={{fontSize:20}}>{league.icon}</span>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:league.color}}>Ligue {league.name}</div>
            <div style={{fontSize:10,color:"#888"}}>{xp.toLocaleString()} XP</div>
          </div>
        </div>
      </div>

      {/* GOAL PICKER */}
      {showGoalPicker && (
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,zIndex:500,width:300}}>
          <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>🎯 Objectif quotidien</div>
          <div style={{color:"#888",fontSize:13,marginBottom:20}}>Combien de minutes par jour ?</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {DAILY_GOALS.map(g=>(
              <button key={g} onClick={()=>{setDailyGoal(g);setShowGoalPicker(false);}} style={{
                padding:"14px",borderRadius:10,border:`2px solid ${dailyGoal===g?"#6C63FF":C.border}`,cursor:"pointer",
                background:dailyGoal===g?"rgba(108,99,255,0.2)":C.bg,color:dailyGoal===g?"#A89CFF":C.text,fontWeight:700,fontSize:15,
              }}>
                {g} min
                <div style={{fontSize:10,color:"#888",fontWeight:400,marginTop:2}}>
                  {g<=5?"Décontracté":g<=10?"Normal":g<=15?"Intensif":"Hardcore"}
                </div>
              </button>
            ))}
          </div>
          <button onClick={()=>setShowGoalPicker(false)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700}}>
            Fermer
          </button>
        </div>
      )}

      {/* LEAGUE MODAL */}
      {showLeague && (
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,zIndex:500,width:320}}>
          <div style={{fontWeight:800,fontSize:18,marginBottom:16,textAlign:"center"}}>🏆 Ligues</div>
          {LEAGUES.map((l,i)=>{
            const isCurrentLeague = league.name===l.name;
            const nextLeague = LEAGUES[i+1];
            return(
              <div key={l.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:10,marginBottom:8,background:isCurrentLeague?`${l.color}18`:C.bg,border:`1px solid ${isCurrentLeague?l.color:C.border}`}}>
                <span style={{fontSize:28}}>{l.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,color:l.color}}>{l.name}</div>
                  <div style={{fontSize:11,color:"#888"}}>{l.min.toLocaleString()} XP requis</div>
                  {isCurrentLeague && nextLeague && (
                    <div style={{marginTop:4}}>
                      <div style={{background:C.border,borderRadius:99,height:4}}>
                        <div style={{height:"100%",borderRadius:99,width:`${Math.min(100,Math.round(((xp-l.min)/(nextLeague.min-l.min))*100))}%`,background:l.color}}/>
                      </div>
                      <div style={{fontSize:10,color:"#888",marginTop:2}}>{xp-l.min}/{nextLeague.min-l.min} XP pour {nextLeague.name}</div>
                    </div>
                  )}
                </div>
                {isCurrentLeague && <span style={{color:l.color,fontSize:14}}>←</span>}
              </div>
            );
          })}
          <button onClick={()=>setShowLeague(false)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#6C63FF",color:"#fff",fontWeight:700,marginTop:8}}>
            Fermer
          </button>
        </div>
      )}

      {/* MASCOT BAR */}
      <div style={{background:`linear-gradient(135deg,rgba(108,99,255,0.1),rgba(79,172,254,0.05))`,borderBottom:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>🦉</span>
        <span style={{fontSize:13,color:"#CCC",fontStyle:"italic"}}>{mascotMsg}</span>
      </div>

      {/* WEEKLY XP CHART */}
      <div style={{background:C.card,margin:"12px 16px",borderRadius:12,padding:"14px 16px",border:`1px solid ${C.border}`}}>
        <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>📈 XP cette semaine</div>
        <div style={{display:"flex",gap:6,alignItems:"flex-end",height:50}}>
          {["D","L","M","M","J","V","S"].map((d,i)=>{
            const val = weeklyXP[i]||0;
            const max = Math.max(...weeklyXP, 1);
            const h = Math.max(4, Math.round((val/max)*44));
            const today = new Date().getDay();
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:"100%",height:h,borderRadius:4,background:i===today?"#6C63FF":"#1A1D2E",transition:"height 0.3s"}}/>
                <span style={{fontSize:9,color:i===today?"#A89CFF":"#555",fontWeight:i===today?700:400}}>{d}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* The original App */}
      <App/>
    </div>
  );
}
